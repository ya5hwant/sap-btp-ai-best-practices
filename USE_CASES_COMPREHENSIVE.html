    <script>
        const useCases = [
            {

                title: '01: Post-Sales Chatbot (Automotive)',
                short: '01 Post-Sales Chatbot',
                painPoint: '"Our customers call support for simple questions about service status, warranty, and appointments. 30-40% of calls are routine, consuming staff and frustrating customers."',
                businessImpact: '30-40% of calls are routine • Cost: €5-10 per call • Opportunity: Save €100k+/year • NPS improvement',
                discoveryQuestions: ['How many daily inquiries?', 'Top 5-10 customer questions?', 'Customer data centralized?', 'Acceptable response latency?', 'Escalation path if bot fails?'],
                approach: '<strong>LangGraph architecture:</strong> Multi-step reasoning (customer → vehicle → history). Streaming responses for UX. Tools: find_client, get_service_history, get_warranty_status, schedule_appointment. FastAPI + UI5 frontend.',
                keyDecisions: [
                    { title: 'LangGraph over Rasa', text: 'Multi-turn reasoning, state persistence, easy SAP integration, custom business logic' },
                    { title: 'CSV → HANA scaling', text: 'MVP: CSV iteration. Prod: HANA for 1M+ records, caching, concurrency' },
                    { title: 'Session Redis', text: 'Distributed state with 30-min TTL for security and scalability' }
                ],
                implementation: '<pre>from langgraph.graph import StateGraph\ngraph = StateGraph(AgentState)\ngraph.add_node("fetch_data", fetch_node)\ngraph.add_edge("identify", "fetch")</pre>',
                risks: [
                    { risk: 'Wrong tool call', prob: 'Medium', mitigation: 'Pre-flight validation, detailed descriptions' },
                    { risk: 'Hallucinations', prob: 'Medium', mitigation: 'Constrain to tool results only' },
                    { risk: 'Data leaks', prob: 'High', mitigation: 'Audit logs, encryption' }
                ],
                metrics: ['40% call handling → €100k savings', '<1min response vs 10min human', 'NPS >50', '<5% escalation rate', '>60% repeat usage'],
                interviewTips: [
                    { q: 'Multi-system data?', a: 'Abstract layer queries all parallel + HANA cache for future' },
                    { q: 'Ambiguous names?', a: 'Ask for email/VIN to disambiguate or escalate' },
                    { q: 'Multilingual?', a: 'LLM handles naturally, store language preference' }
                ],
                tech: ['LangGraph', 'FastAPI', 'UI5', 'Redis', 'HANA']
            },
            {
                id: '02-anomaly-detection',
                title: '02: Anomaly Detection (Sales Orders)',
                short: '02 Anomaly Detection',
                painPoint: '"Unusual orders slip through—fraud or data entry errors. Lost €50k last month on improper discount to new customer. Need automated flagging with high confidence."',
                businessImpact: '€500k/year fraud loss • 40% false positive rate (team ignores) • Target: Catch 80% with <5% FP',
                discoveryQuestions: ['Orders/day volume?', 'Anomaly types?', 'False positive tolerance?', 'Labeled historical data?', 'Action on flag?'],
                approach: '<strong>Isolation Forest + SHAP:</strong> Unsupervised learning (no labels needed). Fast O(n) trees. Explainability: SHAP (technical) + LLM (business narrative). Weekly retraining. Batch scoring every 4 hours.',
                keyDecisions: [
                    { title: 'Batch > Real-time V1', text: 'Faster to build, more accurate (full-day context), cost-effective, sufficient' },
                    { title: 'Weekly retrain', text: 'Monitor performance drift >5%, keep 5 versions for rollback' },
                    { title: 'HANA storage', text: 'Columnar, indexes, date partitioning for fast queries' }
                ],
                implementation: '<pre>from sklearn.ensemble import IsolationForest\nmodel = IsolationForest(contamination=0.05)\nscores = model.score_samples(data)\nexplainer = shap.TreeExplainer(model)</pre>',
                risks: [
                    { risk: 'FP rate too high', prob: 'Medium', mitigation: 'Start conservative 0.8+ threshold' },
                    { risk: 'Model drift', prob: 'Medium', mitigation: 'Drift detection, auto-retrain' },
                    { risk: 'No trust', prob: 'Medium', mitigation: 'Weekly calibration, ROI transparency' }
                ],
                metrics: ['80% anomaly catch → €320k savings', '<5% false positives', '<30min detection', '<5min review time', '>99.5% uptime'],
                interviewTips: [
                    { q: 'Why not DL?', a: 'Needs 1000s labeled samples. IF needs zero labels, 100x faster. Use IF unless massive labeled dataset' },
                    { q: 'Class imbalance?', a: 'IF naturally isolates outliers, no class balancing needed vs supervised' },
                    { q: 'False negatives?', a: 'Lower contamination (10%) or threshold (0.7) to be aggressive, trade FP' }
                ],
                tech: ['Isolation Forest', 'SHAP', 'scikit-learn', 'HANA', 'Python']
            },
            {
                id: '03-customer-credit-check',
                title: '03: Customer Credit Check',
                short: '03 Credit Check',
                painPoint: '"Manual credit evaluation is inconsistent. Analysts disagree on approvals (±20% variance). Need consistent extraction, validation, and compliance audit trail."',
                businessImpact: 'Process time: 1 day → target 2 hours • Inconsistency: ±20% variance • Compliance risk: Audit gaps',
                discoveryQuestions: ['Current process walkthrough?', 'Docs per application?', 'Extraction accuracy target?', 'AI decides or assists?', 'Policy rules documented?'],
                approach: '<strong>SAP Document AI + Validation + Rule Engine:</strong> Extract KYC/CSF with confidence scores. Cross-validate: RFC match, addresses, dates plausible. Rule-based policy (compliance > ML). Audit trail on every decision.',
                keyDecisions: [
                    { title: 'Document AI', text: '95%+ accuracy, pre-trained on financial docs, confidence scores' },
                    { title: 'Validation layer', text: 'Cross-document consistency checks for fraud signals' },
                    { title: 'Rules not ML', text: 'Regulatory requirement: explainability per decision' }
                ],
                implementation: '<pre>extracted = document_ai.process(doc)\nvalidation_score = check_consistency()\nif validation_score > 70:\n  apply_policy_rules()</pre>',
                risks: [
                    { risk: 'Extraction fails', prob: 'Medium', mitigation: 'Confidence <95% → manual review' },
                    { risk: 'FP/FN policy', prob: 'Medium', mitigation: 'Adjust thresholds, test on holdout' },
                    { risk: 'Compliance', prob: 'High', mitigation: 'Audit log every decision' }
                ],
                metrics: ['2 hour approval time', '<5% variance', '100% audit trail', 'Compliance ready', '>90% auto-approve rate'],
                interviewTips: [
                    { q: 'Confidence scores low?', a: 'Request new docs or route to manual review' },
                    { q: 'Policy conflicts?', a: 'Use decision trees, document every rule' },
                    { q: 'False denials?', a: 'Adjust thresholds, monitor impact' }
                ],
                tech: ['Document AI', 'SAP', 'Python', 'Rule Engine']
            },
            {
                id: '04-diagram-bpmn',
                title: '04: Diagram-to-BPMN Converter',
                short: '04 Diagram BPMN',
                painPoint: '"Analysts draw business processes on whiteboard/Visio. Converting to BPMN for Signavio is manual—2 hours per diagram × 20/month = 40 hours wasted."',
                businessImpact: 'Manual conversion: 2 hours × 20 diagrams = 40 hours/month = 1 FTE',
                discoveryQuestions: ['Diagram formats?', 'Complexity levels?', 'BPMN usage?', 'Creation frequency?', 'Consistency?'],
                approach: '<strong>Vision LLM + JSON → BPMN XML:</strong> Upload diagram → Claude/GPT-4o extracts structure (tasks, decisions, flows, swimlanes) → JSON validation → BPMN XML template generation → Signavio import.',
                keyDecisions: [
                    { title: 'Vision LLM', text: 'Claude 3.5 Sonnet: handles complex diagrams, swimlanes, annotations' },
                    { title: 'JSON intermediate', text: 'Validate before XML, allow user editing before final' },
                    { title: 'Template BPMN', text: 'Standard XML templates, deterministic conversion' }

                implementation: '<pre>json_result = llm.extract_diagram(image)\nvalidate(json_result)\nbpmn_xml = generate_from_template(json_result)</pre>',

                    { risk: 'Complex diagrams', prob: 'Medium', mitigation: 'Request simple structures or manual' },
                    { risk: 'Handwriting', prob: 'Medium', mitigation: 'Scanned clarity requirement' },
                    { risk: 'JSON validation', prob: 'Low', mitigation: 'Schema validation before XML' }

                metrics: ['40 hours/month saved', '95%+ accuracy', '<5min per diagram', 'Zero rework rate'],
                interviewTips: [
                    { q: 'Swimlanes?', a: 'LLM identifies ownership, BPMN lanes' },
                    { q: 'Errors?', a: 'JSON preview before convert, user can edit' },
                    { q: 'Complex logic?', a: 'Request structured diagram or escalate' }
                ],
                tech: ['Claude Vision', 'JSON', 'BPMN XML', 'Signavio']

            {
                id: '05-log-analyzer',
                title: '05: AI Log Analyzer',
                short: '05 Log Analyzer',
                painPoint: '"Thousands of error logs daily. Most noise. Operators waste 50% of time sorting—need intelligent filtering, clustering, SAP OSS linking."',

                discoveryQuestions: ['Logs/day volume?', 'Log sources?', 'Critical %?', 'Error code mapping?', 'Current MTTR?'],
                approach: '<strong>Log normalization + LLM triage + OSS integration:</strong> Normalize logs to JSON. LLM assesses severity, impact, root cause. Link to SAP OSS notes. Prioritize by impact. Batch processing hourly.',
                keyDecisions: [
                    { title: 'Normalize first', text: 'Fast search, pattern detection, LLM understanding' },
                    { title: 'LLM for reasoning', text: 'Severity, impact, root cause in business language' },
                    { title: 'OSS grounding', text: 'Link to SAP solutions, not hallucinations' }
                ],
                implementation: '<pre>normalized = normalize_log(raw)\nanalysis = llm.assess(normalized)\noss_notes = link_to_oss(analysis)</pre>',
                risks: [
                    { risk: 'LLM hallucinations', prob: 'Medium', mitigation: 'Ground in OSS notes only' },
                    { risk: 'False severity', prob: 'Medium', mitigation: 'History-based tuning' },
                    { risk: 'OSS API down', prob: 'Low', mitigation: 'Cache, fallback' }
                ],
                metrics: ['MTTR: 30 minutes', '95% critical catch', '<5% false positives', '>99% uptime'],
                interviewTips: [
                    { q: 'Real-time vs batch?', a: 'Batch hourly more efficient, real-time if urgent alerts' },
                    { q: 'Unknown errors?', a: 'Cluster similar, request OSS or escalate' },
                    { q: 'Integration?', a: 'API to log ingestion pipeline' }
                ],
                tech: ['LLM', 'SAP OSS', 'Python', 'Log Pipeline']
            },
            {
                id: '06-video-monitoring',
                title: '06: Video Incident & Safety Monitoring',
                short: '06 Video Safety',
                painPoint: '"Manual warehouse video monitoring is expensive & inconsistent. Workers not wearing hard hats, equipment misuse. False alarms cause evacuations."',
                businessImpact: '5-10 incidents/month • €10k per incident • High false alarm cost',
                discoveryQuestions: ['Key incidents?', 'False alarm tolerance?', 'Live vs batch?', 'Alert latency?', 'Privacy policy?'],
                approach: '<strong>Gemini 2.5 Pro + Frame extraction + Confidence thresholds:</strong> Extract key frames (motion detection or 1/sec). Send to Vision LLM. High confidence threshold (>90%) to avoid false alarms. Alert only on critical.',
                keyDecisions: [
                    { title: 'Frame sampling', text: 'Motion detection or 1-sec intervals to reduce costs' },

                implementation: '<pre>frames = extract_frames(video, strategy="motion")\nfor frame in frames:\n  result = gemini.analyze(frame)\n  if result.confidence > 0.9:\n    alert(result)</pre>',

                    { risk: 'Missed incidents', prob: 'Medium', mitigation: 'Lower threshold gradually' },
                    { risk: 'Privacy concerns', prob: 'High', mitigation: 'Compliance, data minimization' }

                metrics: ['80% incident catch', '<2% false alarm', '<30sec alert time', '>99% uptime'],
                interviewTips: [
                    { q: 'Night vision?', a: 'IR cameras improve detection' },
                    { q: 'Weather?', a: 'Train on rainy/snowy conditions' },
                    { q: 'Privacy?', a: 'Anonymize frames, delete after X days' }
                ],
                tech: ['Gemini 2.5 Pro', 'Python', 'Video Processing']

                tech: ['Document AI', 'HANA', 'SAP', 'Python']
            }
        ];

        function initializeTabs() {
            const tabList = document.getElementById('usecase-tabs');
            const content = document.getElementById('usecase-content');

            useCases.forEach((uc, index) => {
                const isActive = index === 0 ? 'active' : '';
                const tab = document.createElement('li');
                tab.className = 'nav-item';
                tab.innerHTML = `<button class="nav-link ${isActive}" id="${uc.id}-tab" data-bs-toggle="tab" data-bs-target="#${uc.id}" role="tab">${uc.short}</button>`;
                tabList.appendChild(tab);

                const pane = document.createElement('div');
                pane.className = `tab-pane fade ${isActive ? 'show active' : ''}`;
                pane.id = uc.id;
                pane.innerHTML = generateUseCaseContent(uc);
                content.appendChild(pane);
            });
        }

        function generateUseCaseContent(uc) {
            let html = `<div class="use-case-title">${uc.title}</div>`;

            html += `<div class="section-header"><i class="fas fa-exclamation-circle"></i> Pain Point</div>`;
            html += `<div class="pain-point"><p class="quote-text">${uc.painPoint}</p><p><strong>Business Impact:</strong><br/>${uc.businessImpact}</p></div>`;

            html += `<div class="section-header"><i class="fas fa-question-circle"></i> Discovery Questions</div>`;
            html += `<div class="discovery-box"><ul>`;
            uc.discoveryQuestions.forEach(q => html += `<li>${q}</li>`);
            html += `</ul></div>`;

            html += `<div class="section-header"><i class="fas fa-lightbulb"></i> Your Approach</div>`;
            html += `<div class="approach-section">${uc.approach}</div>`;

            html += `<div class="section-header"><i class="fas fa-chess"></i> Key Architectural Decisions</div>`;
            uc.keyDecisions.forEach(d => {
                html += `<div class="decision-box"><strong>✓ ${d.title}</strong><p style="margin-top: 0.5rem;">${d.text}</p></div>`;
            });

            html += `<div class="section-header"><i class="fas fa-code"></i> Implementation Walk-Through</div>`;
            html += `${uc.implementation}`;

            html += `<div class="section-header"><i class="fas fa-shield-alt"></i> Risk Mitigation</div>`;
            html += `<table><tr><th style="width: 20%">Risk</th><th style="width: 15%">Probability</th><th>Mitigation</th></tr>`;
            uc.risks.forEach(r => {
                html += `<tr><td><strong>${r.risk}</strong></td><td>${r.prob}</td><td>${r.mitigation}</td></tr>`;
            });
            html += `</table>`;

            html += `<div class="section-header"><i class="fas fa-chart-line"></i> Success Metrics</div>`;
            html += `<div class="success-metrics"><ul>`;
            uc.metrics.forEach(m => html += `<li>${m}</li>`);
            html += `</ul></div>`;

            html += `<div class="section-header"><i class="fas fa-lightbulb"></i> Interview Tips</div>`;
            uc.interviewTips.forEach(tip => {
                html += `<div class="interview-box"><strong>Q: ${tip.q}</strong><p style="margin-top: 0.5rem; margin-bottom: 0;"><strong>A:</strong> ${tip.a}</p></div>`;
            });

            html += `<div class="section-header"><i class="fas fa-tools"></i> Technology Stack</div>`;
            html += `<div class="tech-stack">`;
            uc.tech.forEach(t => {
                let category = 'backend';
                if (['UI5', 'React', 'Streamlit', 'Teams', 'JavaScript', 'TypeScript'].some(x => t.includes(x))) category = 'frontend';
                if (['HANA', 'Redis', 'Postgres', 'Vector Tables'].some(x => t.includes(x))) category = 'db';
                if (['Isolation Forest', 'scikit-learn', 'LangGraph', 'sentence-transformers', 'SHAP', 'LLM'].some(x => t.includes(x))) category = 'ml';
                html += `<span class="tech-badge ${category}">${t}</span>`;
            });
            html += `</div>`;

            return html;
        }

        document.getElementById('usecase-search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const tabs = document.querySelectorAll('.nav-link');
            tabs.forEach(tab => {
                const text = tab.textContent.toLowerCase();
                tab.style.display = text.includes(query) ? '' : 'none';
            });
        });

        window.addEventListener('scroll', () => {
            const backToTop = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        document.getElementById('backToTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        document.addEventListener('DOMContentLoaded', initializeTabs);
    </script>
</body>

</html>
