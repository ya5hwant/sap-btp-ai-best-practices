\n    score = (\n        0.5 * product['similarity'] +  # Vector similarity\n        0.2 * industry_match_score(product) +  # Industry fit\n        0.2 * product['review_score'] / 5.0 +  # Reviews\n        0.1 * product['in_stock_percentage']  # Availability\n    )\n    recommendations.append({\n        'product_id': product['product_id'],\n        'name': product['name'],\n        'score': score,\n        'reason': [\n            f\"Similarity: {product['similarity']:.1%}\",\n            f\"Industry: {product['category']}\",\n            f\"Rating: {product['review_score']}/5\"\n        ]\n    })\n\n# Sort and return top 5\nrecommendations.sort(key=lambda x: x['score'], reverse=True)\nreturn recommendations[:5]\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **Poor embedding quality** | Use sentence-transformers model, fine-tune on domain data if needed |\n| **Recommendations too similar** | Diversify output (show different use cases) |\n| **Vector outdated** | Refresh embeddings monthly or when product changes |\n| **Product metadata incomplete** | Use LLM to auto-generate descriptions if missing |\n| **User doesn't understand recommendations** | Show reasoning (why this product?) |\n\n---\n\n## Success Metrics\n\n**Matching Quality:**\n- 95% recommendation accuracy (customer agrees it's relevant)\n- 80% of recommended products result in sale\n\n**Speed:**\n- 5-10 seconds to generate recommendations (vs. 1 hour manual)\n\n**Adoption:**\n- 70%+ of sales team uses matcher\n\n**Financial:**\n- Increase close rate by 10% (better product matching)\n- Save 50+ hours/week in sales team time\n\n---\n\n## Related Use Cases\n\n- **Product Catalog Search** (Similar: Semantic search in catalog)\n- **Email Agent** (Similar: NLP-based need extraction)\n"}, {"num": "10", "short": "10 Email Agent", "content": "# USE CASE 10: Email Agent\n\n## Quick Summary\nIntelligent email triage system: Classifies emails, extracts entities, routes to appropriate team, generates draft responses. Uses LLM for understanding + rule-based routing.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We receive 500+ customer emails daily. Routing them to the right team is manual. Some emails are sales inquiries, some are support tickets, some are complaints. We need intelligent triage with automatic routing.\"\n\n**Business Impact:**\n- Current triage: Manual 2 hours/day (1 FTE)\n- Misrouting: 20% of emails go to wrong team\n- Response delay: Some emails stuck in queue for hours\n\n---\n\n## Discovery Questions\n\n1. **\"What teams receive emails?\"** (Sales, Support, Finance, HR?)\n2. **\"What percentage get misrouted?\"** (20%? 50%?)\n3. **\"Should system generate draft responses?\"** (Yes = higher value)\n4. **\"Any compliance requirements?\"** (GDPR, audit trail?)\n5. **\"Integration with email system?\"** (Outlook, Gmail, SAP system?)\n\n---\n\n## Your Approach\n\n### Phase 1: Email Intake\n\"Monitor email inbox, trigger on new message:\n\n```\nIntegration:\n- Outlook: Use Microsoft Graph API\n- Gmail: Use Gmail API\n- SAP: Use email routing\n\nFor each email:\n- Extract: sender, subject, body, attachments\n- Parse: HTML to plain text\n- Store: In processing queue\n```\"\n\n### Phase 2: Email Classification\n\"Classify by intent:\n\n```\nIntent types:\n- SALES_INQUIRY: 'I want to buy...'\n- SUPPORT_TICKET: 'Product not working...'\n- COMPLAINT: 'Very disappointed...'\n- BILLING_ISSUE: 'Invoice incorrect...'\n- GENERAL_QUESTION: 'Can you tell me...'\n- FEEDBACK: 'Great product...'\n\nLLM prompt:\n'Classify this email by intent:\n{email_subject}\n{email_body}\n\nReturn JSON: {\\\"intent\\\": \\\"SALES_INQUIRY\\\", \\\"confidence\\\": 0.95}'\n```\"\n\n### Phase 3: Entity Extraction\n\"Extract key information:\n\n```\nEntities:\n- Customer name, email, company\n- Product mentioned\n- Issue/request described\n- Priority signals ('urgent', 'today', etc.)\n- Sentiment (positive, negative, neutral)\n\nLLM prompt:\n'Extract entities from this email:\n{email_body}\n\nReturn JSON: {\n  \\\"customer_name\\\": \\\"\\\",\n  \\\"product\\\": \\\"\\\",\n  \\\"issue\\\": \\\"\\\",\n  \\\"priority\\\": \\\"NORMAL\\\",\n  \\\"sentiment\\\": \\\"NEUTRAL\\\"\n}'\n```\"\n\n### Phase 4: Intelligent Routing\n\"Route to appropriate team based on classification:\n\n```\nRules:\n- SALES_INQUIRY → Sales team\n- SUPPORT_TICKET + URGENT → Support (escalated)\n- SUPPORT_TICKET + NORMAL → Support queue\n- COMPLAINT + HIGH_SENTIMENT → Management review\n- BILLING_ISSUE → Finance team\n- FEEDBACK → Archive (log for analysis)\n\nFallback: If confidence <70%, flag for human review\n```\"\n\n### Phase 5: Draft Response Generation\n\"Generate draft response:\n\n```\nFor each intent type, have template + personalization:\n\nSALES_INQUIRY template:\n'Thank you for your interest in [PRODUCT].\nWe'd be happy to discuss your needs.\nHere are some resources: [LINKS]\nOur sales team will contact you within 24 hours.'\n\nGenerate draft:\nllm_response = llm.generate(f'''\nGenerate professional email response to:\nIntent: {intent}\nCustomer concern: {issue}\nSentiment: {sentiment}\n\nKeep response under 150 words, professional tone.\n''')\n\nRoutes to team member for approval before sending.\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: LLM + Rules Hybrid\n\n**What you'd say:**\n\"I'd combine LLM + rules:\n\nLLM (extraction):\n- Classify intent\n- Extract entities\n- Gauge sentiment\n\nRules (routing):\n- Intent + priority → team assignment\n- Sentiment + intent → escalation logic\n\nWhy hybrid?\n- LLM handles ambiguity\n- Rules ensure consistency\n- Cheaper than pure LLM (LLM only for extraction, rules for logic)\"\n\n### Decision 2: Human Review for Low Confidence\n\n**What you'd say:**\n\"For emails where classification confidence <70%:\n\n1. Flag for human review (don't auto-route)\n2. Show LLM's analysis + alternative classifications\n3. Human chooses correct classification\n4. Feedback loop improves model\n\nThis prevents misrouting of ambiguous emails.\"\n\n### Decision 3: Response Generation as Draft, Not Auto-Send\n\n**What you'd say:**\n\"Generate draft responses but don't auto-send:\n\n1. LLM generates draft\n2. Routes with email to team member\n3. Human reviews + edits\n4. Human clicks 'send'\n\nWhy?\n- Maintains human oversight\n- Builds trust (not bot-first)\n- Allows personalization\n- Complies with compliance requirements\"\n\n---\n\n## Implementation Walk-Through\n\n### Code Skeleton\n\n```python\nfrom anthropic import Anthropic\nimport json\n\nasync def process_email(email):\n    client = Anthropic()\n    \n    # Step 1: Classify intent\n    intent_response = client.messages.create(\n        model=\"claude-3-5-sonnet-20241022\",\n        max_tokens=200,\n        messages=[\n            {\n                \"role\": \"user\",\n                \"content\": f'''\n                Classify this email:\n                Subject: {email['subject']}\n                Body: {email['body'][:500]}\n                \n                Return JSON:\n                {{\n                  \"intent\": \"SALES_INQUIRY|SUPPORT_TICKET|COMPLAINT|etc\",\n                  \"confidence\": 0.95,\n                  \"reasoning\": \"brief explanation\"\n                }}\n                '''\n            }\n        ]\n    )\n    intent_data = json.loads(intent_response.content[0].text)\n    \n    # Step 2: Extract entities\n    entity_response = client.messages.create(\n        model=\"claude-3-5-sonnet-20241022\",\n        max_tokens=300,\n        messages=[\n            {\n                \"role\": \"user\",\n                \"content\": f'''\n                Extract entities from this email:\n                {email['body']}\n                \n                Return JSON:\n                {{\n                  \"customer_name\": \"\",\n                  \"product\": \"\",\n                  \"issue\": \"\",\n                  \"priority\": \"NORMAL|HIGH|URGENT\",\n                  \"sentiment\": \"POSITIVE|NEUTRAL|NEGATIVE\"\n                }}\n                '''\n            }\n        ]\n    )\n    entities = json.loads(entity_response.content[0].text)\n    \n    # Step 3: Route based on rules\n    team = route_email(intent_data, entities)\n    \n    # Step 4: Generate draft response\n    if should_generate_response(intent_data):\n        draft_response = client.messages.create(\n            model=\"claude-3-5-sonnet-20241022\",\n            max_tokens=200,\n            messages=[\n                {\n                    \"role\": \"user\",\n                    \"content\": f'''\n                    Generate professional email response to customer:\n                    Intent: {intent_data['intent']}\n                    Issue: {entities['issue']}\n                    Keep under 150 words.\n                    '''\n                }\n            ]\n        )\n        draft = draft_response.content[0].text\n    else:\n        draft = None\n    \n    # Step 5: Queue for team review\n    queue_for_team_review({\n        'email': email,\n        'intent': intent_data,\n        'entities': entities,\n        'team': team,\n        'draft_response': draft,\n        'confidence': intent_data['confidence']\n    })\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **Misclassification routes to wrong team** | Confidence threshold + human review for <70% confidence |\n| **Draft response inappropriate** | Require human approval before send |\n| **Privacy breach** | Encrypt emails at rest, audit trail for access |\n| **LLM cost** | Batch process, cache similar emails, use cheaper models where possible |\n\n---\n\n## Success Metrics\n\n**Speed:**\n- Email routed within 5 seconds (vs. manual)\n- 80% automated (20% require human review)\n\n**Accuracy:**\n- 95% correct routing (vs. current 80%)\n- <1% misrouted to completely wrong team\n\n**Cost:**\n- Save 1 FTE in email triage (€50k/year)\n\n**User Satisfaction:**\n- Faster response times\n- Better email organization\n\n---\n\n## Related Use Cases\n\n- **Post-Sales Chatbot** (Similar: LLM + tool orchestration)\n- **Intelligent Negotiation Assistant** (Similar: LLM for business processes)\n"}, {"num": "11", "short": "11 Document Outlier Detection", "content": "# USE CASE 11: Document Outlier Detection\n\n## Quick Summary\nDetect unusual or fraudulent documents in bulk processing pipelines using unsupervised anomaly detection. Similar to sales order anomaly detection but for document batches.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We process thousands of documents per month—invoices, contracts, receipts. Some are fraudulent or contain serious errors. We need to flag outliers automatically before they enter our system.\"\n\n**Business Impact:**\n- Fraud loss: €200k/year\n- Current detection: Manual (expensive)\n- Target: Catch 95% of outliers\n\n---\n\n## Your Approach\n\n**Similar to Anomaly Detection (Use Case 2), but applied to documents:**\n\nKey differences:\n- Features extracted from document metadata (not transactional data)\n- Document-specific anomalies (forged signatures, tampered amounts, etc.)\n- Integration with document scanning pipeline\n\n**Implementation:**\n\n```\nFeature engineering:\n- File size vs. normal (very small? very large?)\n- Font consistency (multiple fonts in signature area?)\n- Numeric patterns (invoice amounts, dates unusual?)\n- Text anomalies (typical language vs. garbled text?)\n- Metadata (file creation date vs. document date match?)\n\nModel:\n- Isolation Forest on document features\n- SHAP explanations: \"Why is this document unusual?\"\n```\n\n---\n\n## Success Metrics\n\n- Detect 95% of fraudulent documents\n- <2% false positive rate\n- Cost savings: €150k+/year\n\n---\n\n## Related Use Cases\n\n- **Anomaly Detection in Sales Orders** (Similar pattern, different domain)\n"}, {"num": "12", "short": "12 Intelligent Negotiation", "content": "# USE CASE 12: Intelligent Negotiation Assistant (Procurement)\n\n## Quick Summary\nAI-assisted procurement negotiation: Analyzes supplier proposals, benchmarks against market prices, recommends negotiation tactics, generates counter-offers. Combines data analysis + LLM reasoning.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"When we negotiate with suppliers, we often don't have enough context. Is this price good? What did we pay last year? What's market rate? We need data-driven negotiation support.\"\n\n**Business Impact:**\n- Current savings rate: 5-10% on negotiations\n- Target savings rate: 15-20%\n- Procurement spend: €100M/year\n- Opportunity: €5-10M additional savings\n\n---\n\n## Discovery Questions\n\n1. **\"Do you have historical supplier pricing?\"** (Yes = can benchmark)\n2. **\"What's the negotiation timeline?\"** (Days? Weeks?)\n3. **\"Are there compliance constraints?\"** (Fixed price tiers? Volume discounts?)\n4. **\"What suppliers is this for?\"** (Single vs. multiple)\n\n---\n\n## Your Approach\n\n### Phase 1: Collect Proposal Data\n\"Supplier submits:\n- Item list, quantities, prices\n- Terms (payment, delivery, warranty)\n- Volume discounts\"\n\n### Phase 2: Benchmark Analysis\n\"Compare to:\n- Historical pricing from this supplier\n- Pricing from competitors (market data)\n- Industry benchmarks\n\nExample:\n```\nThis supplier quotes: €50/unit\n- Last year from them: €48/unit (price increased 4%)\n- Competitor average: €45/unit\n- Market range: €40-55/unit\n\nInsight: 'Slightly above market, but aligned with their history'\n```\"\n\n### Phase 3: Negotiation Recommendations\n\"Generate tactics:\n\n```\nLLM prompt:\n'We have a supplier quote.\nHistorical price: €48\nCurrent quote: €50\nMarket average: €45\n\nRecommend negotiation tactics:\n- Immediate action (before counteroffering)?\n- Target price for counteroffer?\n- Best negotiation angle?\n- Walk-away threshold?'\n\nOutput:\n- 'Market average is €45, we should counteroffer €43'\n- 'Their volume discount is weak—press them there'\n- 'Payment terms: could we get better?'\n- 'Walk-away if they don't go below €47'\n```\"\n\n### Phase 4: Counter-Offer Generation\n\"Generate structured counter-offer:\n\n```\nTemplate:\n'We appreciate your proposal for [ITEMS].\nAfter comparing with market benchmarks,\nwe recommend the following adjustments:\n\nUnit price: €50 → €45 (aligned with market)\nVolume discount: Current [%] → [RECOMMENDED %]\nPayment terms: [PROPOSED]\nDelivery: [PROPOSED]\n\nWe believe this is fair and competitive.\nPlease review and let us know your thoughts.'\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Data-Driven First\n\n**What you'd say:**\n\"Always start with data:\n1. Historical pricing (what did we pay?)\n2. Market benchmarks (what's competitive?)\n3. Terms analysis (payment, delivery)\n\nThen use LLM for:\n- Recommendation narrative\n- Negotiation tactics\n- Counter-offer wording\n\nWhy? Data grounds LLM's reasoning.\"\n\n### Decision 2: Negotiator Tools, Not Auto-Negotiation\n\n**What you'd say:**\n\"This is decision support, not automation:\n- Procurement person still negotiates\n- AI provides data + recommendations\n- Human makes final decision\n\nWhy not auto-negotiate?\n- Relationships matter\n- Compliance requirements\n- Business strategy\"\n\n---\n\n## Implementation Walk-Through\n\n```python\ndef analyze_supplier_proposal(proposal, supplier_id):\n    # Step 1: Extract proposal data\n    items = extract_line_items(proposal)\n    terms = extract_terms(proposal)\n    \n    # Step 2: Benchmark\n    historical = get_supplier_history(supplier_id)\n    market_data = get_market_benchmarks(items)\n    \n    # Step 3: LLM recommendations\n    recommendations = llm.generate(f'''\n        Supplier {supplier_id} proposal analysis:\n        \n        Historical price: €{historical['avg_price']}\n        Quoted price: €{proposal['avg_price']}\n        Market average: €{market_data['avg']}\n        \n        Recommend:\n        1. Price target for counteroffer\n        2. Negotiation angles\n        3. Walk-away threshold\n        4. Terms to push\n    ''')\n    \n    # Step 4: Generate counter-offer\n    counter_offer = generate_counter_offer(\n        proposal, \n        recommendations,\n        market_data\n    )\n    \n    return {\n        'benchmark_analysis': market_data,\n        'recommendations': recommendations,\n        'counter_offer': counter_offer,\n        'estimated_savings': calculate_savings(proposal, counter_offer)\n    }\n```\n\n---\n\n## Success Metrics\n\n- Increase savings rate from 10% to 18% (8% improvement)\n- €100M spend × 8% = €8M additional savings\n- Negotiation time: Reduced by 20%\n\n---\n\n## Related Use Cases\n\n- **Vendor Selection Optimization** (Similar: Supplier analysis, different goal)\n"}, {"num": "13", "short": "13 Product Catalog Search", "content": "# USE CASE 13: Product Catalog Search\n\n## Quick Summary\nAdvanced semantic search across product catalog. User describes what they need, AI finds best matching products using embeddings + vector search. Similar to AI Capability Matcher but more consumer-focused.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Customers browse our product catalog but traditional search is keyword-based. When they describe what they need, they don't get relevant results. We need smarter search that understands meaning.\"\n\n**Business Impact:**\n- Current search relevance: 60%\n- Target search relevance: 90%\n- Increased conversions: Each 10% relevance = 5% conversion uplift\n\n---\n\n## Your Approach\n\n**Same architecture as Use Case 9 (AI Capability Matcher):**\n\n```\n1. Generate embeddings for all products\n2. Customer describes need → embed query\n3. Vector search in HANA\n4. Rank by relevance + personalization\n5. Display with explanations\n\nAdditions:\n- Personalization: Show products based on customer history\n- Filtering: Let users refine search\n- Analytics: Track what customers search for (improve product catalog)\n```\n\n---\n\n## Key Differences from AI Capability Matcher\n\n- **AI Capability Matcher**: B2B, detailed needs analysis\n- **Product Catalog Search**: B2C, consumer-friendly, quick results\n\n---\n\n## Implementation\n\nSame as Use Case 9 but with consumer UX:\n- Simple search box\n- Visual results\n- \"Why this product?\" explanations\n- Related products\n\n---\n\n## Success Metrics\n\n- Search relevance: 90% (vs. 60% keyword)\n- Conversion rate: +5%\n- Search time: <1 second\n\n---\n\n## Related Use Cases\n\n- **AI Capability Matcher** (Similar: Semantic search, B2B version)\n"}, {"num": "14", "short": "14 AI PDF Extraction", "content": "# USE CASE 14: AI PDF Information Extraction\n\n## Quick Summary\nComprehensive document processing system using GPT-4 Vision and SAP AI SDK. Extract structured data from PDFs: text, tables, images. Support complex layouts. Returns JSON/CSV for downstream processing.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We receive hundreds of PDFs daily—reports, contracts, forms. Extracting data manually is slow and error-prone. We need intelligent extraction that handles complex layouts.\"\n\n**Business Impact:**\n- Current extraction: 30 min per document\n- Error rate: 10%\n- Documents/month: 500\n- Opportunity: Save 250 hours/month\n\n---\n\n## Your Approach\n\n### Phase 1: Document Intake\n\"Accept PDF uploads, store temporarily\"\n\n### Phase 2: Layout Analysis\n\"Understand document structure:\n\n```\n- Header section (title, date, etc.)\n- Table sections (structured data)\n- Text sections (body content)\n- Footer sections\n```\"\n\n### Phase 3: Multi-Modal Extraction\n\"Use combination:\n\n```\nGPT-4 Vision: Complex layouts, images, handwriting\nStructured extraction: Tables (OCR → CSV)\nLLM: Natural language understanding\n```\"\n\n### Phase 4: Data Validation\n\"Validate extracted data:\n\n```\n- Required fields present?\n- Data types correct? (date format, numbers)\n- Cross-field consistency? (total = sum of items)\n```\"\n\n### Phase 5: Export\n\"Return structured JSON/CSV:\n\n```json\n{\n  \"extracted_fields\": {\n    \"invoice_number\": \"INV-001\",\n    \"date\": \"2024-03-22\",\n    \"line_items\": [...]\n  },\n  \"confidence\": 0.95,\n  \"errors\": []\n}\n```\"\n\n---\n\n## Implementation\n\n```python\nfrom anthropic import Anthropic\nimport base64\n\ndef extract_pdf_info(pdf_path):\n    client = Anthropic()\n    \n    # Convert PDF to images (page by page)\n    images = convert_pdf_to_images(pdf_path)\n    \n    extracted_data = {}\n    \n    for page_num, image in enumerate(images):\n        # Encode image\n        image_data = base64.b64encode(image).decode('utf-8')\n        \n        # Extract using vision LLM\n        response = client.messages.create(\n            model=\"claude-3-5-sonnet-20241022\",\n            max_tokens=2000,\n            messages=[\n                {\n                    \"role\": \"user\",\n                    \"content\": [\n                        {\n                            \"type\": \"image\",\n                            \"source\": {\n                                \"type\": \"base64\",\n                                \"media_type\": \"image/png\",\n                                \"data\": image_data,\n                            },\n                        },\n                        {\n                            \"type\": \"text\",\n                            \"text\": f\"\"\"Extract all information from this document page ({page_num}):\n                            - Headers, titles, dates\n                            - Tables (return as JSON array)\n                            - Text content\n                            - Any structured fields\n                            \n                            Return as JSON.\"\"\"\n                        }\n                    ],\n                }\n            ],\n        )\n        \n        page_data = json.loads(response.content[0].text)\n        extracted_data[f'page_{page_num}'] = page_data\n    \n    # Combine all pages\n    combined = combine_pages(extracted_data)\n    \n    # Validate\n    validate_extracted_data(combined)\n    \n    return combined\n```\n\n---\n\n## Success Metrics\n\n- 95%+ accuracy extraction\n- 90% of documents fully automated\n- Save 200+ hours/month\n\n---\n\n## Related Use Cases\n\n- **Purchase Order Extractor** (Similar: Document extraction)\n- **Customer Credit Check** (Similar: Document processing)\n"}, {"num": "15", "short": "15 Sales Order Extractor", "content": "# USE CASE 15: Sales Order Extractor\n\n## Quick Summary\nExtract structured data from sales orders (email attachments, PDFs, scanned forms) using Document AI + LLM fallback. Returns order number, customer, items, quantities, prices for SAP import.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Our sales team gets orders in various formats—emails, scanned forms, PDFs. Manual data entry into SAP is slow and error-prone. We need automated extraction and validation.\"\n\n**Business Impact:**\n- Current processing: 20 min per order\n- Orders/day: 50\n- Time loss: 16+ hours/day\n- Opportunity: Save 80 hours/week\n\n---\n\n## Your Approach\n\n**Similar to Use Case 8 (Purchase Order Extractor), but:**\n\n- **Input**: Sales orders from customers (not POs from us)\n- **Flow**: Extraction → Validation → SAP SD order creation\n- **Key fields**: Customer name, items, quantities, requested delivery date\n- **Output**: Integrated directly to SAP SD (sales & distribution)\n\n### Architecture:\n\n```\n1. Order arrives (email, PDF, form)\n2. Extract text/images\n3. Use Document AI for layout-aware extraction\n4. LLM fallback for ambiguous cases\n5. Validate customer exists in SAP\n6. Validate items exist\n7. Create SD order automatically (if high confidence)\n8. Route to review if lower confidence\n```\n\n---\n\n## Key Difference from PO Extractor\n\n- **PO**: We extract POs WE send to suppliers\n- **Sales Order**: We extract orders FROM customers\n\nSame technology, different data flow and business process.\n\n---\n\n## Implementation\n\n```python\n# Very similar to PO extraction\ndef extract_sales_order(document_path):\n    # Document AI extraction\n    extracted = document_ai.process(document_path)\n    \n    # Key fields for sales order\n    order = {\n        'customer_name': extracted.get('customer'),\n        'customer_code': lookup_customer(extracted['customer']),\n        'line_items': extracted.get('items', []),\n        'requested_delivery': extracted.get('delivery_date'),\n        'special_instructions': extracted.get('notes')\n    }\n    \n    # Validate\n    if order['customer_code']:  # Customer found\n        create_sap_sd_order(order)\n    else:\n        queue_for_review(order)\n    \n    return order\n```\n\n---\n\n## Success Metrics\n\n- 80% automated order creation\n- <1 minute processing per order\n- Save 80+ hours/week\n- 95%+ accuracy\n\n---\n\n## Related Use Cases\n\n- **Purchase Order Extractor** (Similar: Document extraction, different flow)\n"}, {"num": "16", "short": "16 RFQx Analysis", "content": "# USE CASE 16: RFQx Document Analysis Utilities\n\n## Quick Summary\nAdvanced RFQ (Request for Quotation) analysis system using multi-page Streamlit interface. Upload supplier quotations, extract structured data, compare suppliers, generate recommendations. Knowledge graph visualization.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"When we issue RFQs to suppliers, we get quotations back in various formats and structures. Comparing 10+ suppliers manually is tedious. We need intelligent analysis and comparison.\"\n\n**Business Impact:**\n- Current RFQ analysis: 8 hours per project\n- RFQ projects/month: 20\n- Opportunity: Save 160 hours/month\n\n---\n\n## Your Approach\n\n### Phase 1: Project Setup\n\"Create RFQ project, define items to source\"\n\n### Phase 2: Process Supplier Documents\n\"Upload supplier quotations:\n\n```\n- Extract: Supplier name, quoted prices, terms, delivery\n- Validate: Prices reasonable? Terms compliant?\n- Structure: Normalize into comparable format\n```\"\n\n### Phase 3: Supplier Comparison\n\"Generate comparison matrix:\n\n```\nSupplier 1 | Supplier 2 | Supplier 3\n-----------+-----------+----------\nPrice: $50 | $45       | $48\nLead time: | 2 weeks   | 3 weeks\n...\n```\"\n\n### Phase 4: Knowledge Graph\n\"Visualize relationships:\n\n```\nSupplier → Offers → Product\n  ↓           ↓\nRating    Price/Quality\n\nInteractive network showing:\n- Which suppliers offer which products\n- Price/quality tradeoffs\n- Risk factors\n```\"\n\n### Phase 5: AI Recommendations\n\"LLM generates narrative:\n\n```\n'Supplier B offers best value—lowest price + shortest lead time.\nRisk: Smaller company, less track record.\nRecommendation: Use Supplier B for 60% volume, \nSupplier A (trusted) for 40% as backup.'\n```\"\n\n---\n\n## Implementation\n\n```python\nimport streamlit as st\nimport pandas as pd\n\n# Page 1: Project Setup\nif page == \"Project Setup\":\n    st.write(\"Create RFQ Project\")\n    project_name = st.text_input(\"Project name\")\n    items = st.text_area(\"Items to source (one per line)\")\n\n# Page 2: Process Suppliers\nelif page == \"Process Suppliers\":\n    uploaded_file = st.file_uploader(\"Upload supplier quote\", type=['pdf', 'xlsx'])\n    if uploaded_file:\n        extracted = extract_rfq(uploaded_file)\n        st.write(extracted)\n        st.button(\"Add to project\")\n\n# Page 3: Compare Suppliers\nelif page == \"Compare Suppliers\":\n    comparison_df = generate_comparison_matrix()\n    st.dataframe(comparison_df)\n    st.download_button(\"Download comparison\", comparison_df.to_csv())\n\n# Page 4: Recommendations\nelif page == \"Recommendations\":\n    recommendations = llm.analyze_rfq_results(suppliers, items)\n    st.write(recommendations)\n```\n\n---\n\n## Success Metrics\n\n- 80% faster RFQ analysis\n- Better supplier selection (cost + quality)\n- Improved supplier performance tracking\n\n---\n\n## Related Use Cases\n\n- **AI Capability Matcher** (Similar: Product-supplier matching)\n- **Intelligent Negotiation** (Similar: Supplier analysis)\n"}, {"num": "17", "short": "17 Email Cockpit", "content": "# USE CASE 17: AI-Powered Email Cockpit\n\n## Quick Summary\nEmail analysis and cockpit system using Streamlit + FastAPI. Process emails, extract business data, route intelligently, generate analytics dashboards. Integration with CRM.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Emails are our primary communication channel, but we're not extracting business value from them. We need a central cockpit to track email conversations, extract action items, monitor response times.\"\n\n**Business Impact:**\n- Current email management: Scattered across Outlook\n- Missing follow-ups: 20% of emails\n- Response time variance: 2 hours to 2 days\n- Opportunity: Centralized visibility + automation\n\n---\n\n## Your Approach\n\n### Phase 1: Email Collection\n\"Integrate with Outlook/Gmail, monitor incoming emails\"\n\n### Phase 2: Email Analysis\n\"Extract:\n\n```\n- From/To/CC\n- Subject & sentiment\n- Action items (implied or explicit)\n- CRM entities (customer, opportunity, deal)\n- Priority signals\n```\"\n\n### Phase 3: Dashboard & Cockpit\n\"Streamlit cockpit showing:\n\n```\n- Unread emails by priority\n- Action items due\n- Response time SLA\n- Customer engagement timeline\n- Email volume trends\n```\"\n\n### Phase 4: Integration\n\"Link to CRM:\n\n```\n- Create/update customer records\n- Link emails to opportunities\n- Track engagement history\n- Measure sales velocity\n```\"\n\n---\n\n## Implementation\n\n```python\nimport streamlit as st\nfrom datetime import datetime\n\n# Email cockpit dashboard\nst.title(\"Email Cockpit\")\n\n# KPIs\ncol1, col2, col3 = st.columns(3)\ncol1.metric(\"Unread Emails\", 42)\ncol2.metric(\"Avg Response Time\", \"2.5 hours\")\ncol3.metric(\"SLA Compliance\", \"94%\")\n\n# Email list\nemails = get_unread_emails()\nfor email in emails:\n    with st.expander(f\"{email['from']} - {email['subject']}\"):\n        st.write(f\"Received: {email['date']}\")\n        st.write(email['body'][:200])\n        \n        extracted = analyze_email(email)\n        st.write(\"**Extracted:**\")\n        st.json(extracted)\n        \n        if st.button(\"Archive\"):\n            archive_email(email)\n\n# Analytics\nst.subheader(\"Analytics\")\nemail_trends = get_email_trends()\nst.line_chart(email_trends)\n```\n\n---\n\n## Success Metrics\n\n- 100% email visibility (all tracked in cockpit)\n- Response time: Reduced by 30%\n- SLA compliance: >95%\n- Email-to-opportunity conversion: +20%\n\n---\n\n## Related Use Cases\n\n- **Email Agent** (Similar: Email processing, different focus)\n- **Post-Sales Chatbot** (Similar: Customer interaction)\n"}, {"num": "18", "short": "18 Vendor Selection", "content": "# USE CASE 18: Vendor Selection Optimization\n\n## Quick Summary\nMulti-criteria vendor selection using scoring algorithm + optimization. Evaluate vendors on cost, quality, lead time, risk, compliance. Generate optimal vendor portfolio.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We evaluate vendors based on multiple criteria. Current process is manual spreadsheets. Sometimes we choose expensive vendors when better options exist. We need data-driven vendor optimization.\"\n\n**Business Impact:**\n- Current vendor cost: Estimated 10% higher than optimal\n- Procurement spend: €100M/year\n- Opportunity: €10M cost reduction\n\n---\n\n## Your Approach\n\n### Phase 1: Vendor Master Data\n\"Collect vendor attributes:\n\n```\n- Cost (unit price, volume discounts)\n- Quality (defect rate, certifications)\n- Lead time (average delivery days)\n- Reliability (on-time % past 12 months)\n- Risk (location, single-source, financial stability)\n```\"\n\n### Phase 2: Scoring Model\n\"Multi-dimensional score:\n\n```\nScore = 0.40 * price_score +\n        0.20 * quality_score +\n        0.15 * leadtime_score +\n        0.15 * reliability_score +\n        0.10 * risk_score\n\n(Weights adjustable by category)\n```\"\n\n### Phase 3: Portfolio Optimization\n\"Allocate volume across vendors:\n\n```\nGoal: Minimize cost while ensuring resilience\n\nConstraints:\n- Single source not >40% of volume (risk)\n- Geographic diversification (2+ regions)\n- Quality/SLA minimums\n- Total volume allocation = 100%\n\nOptimization:\nUse linear programming to find optimal allocation\n```\"\n\n### Phase 4: Scenario Analysis\n\"Answer questions:\n\n```\n'What if Vendor A increases price 5%?'\n'What if Vendor B goes out of business?'\n'What if demand increases 20%?'\n\nRun simulations, show impact on cost/risk\n```\"\n\n---\n\n## Implementation\n\n```python\nfrom scipy.optimize import minimize, LinearConstraint\nimport numpy as np\n\ndef optimize_vendor_portfolio(vendors, total_volume, constraints):\n    # Scoring\n    scores = [calculate_vendor_score(v) for v in vendors]\n    \n    # Optimization\n    def objective(allocation):\n        # Minimize cost\n        cost = sum(allocation[i] * vendors[i]['unit_price'] \n                  for i in range(len(vendors)))\n        return cost\n    \n    # Constraints\n    bounds = [(0, total_volume * 0.4) for _ in vendors]  # Max 40% per vendor\n    \n    result = minimize(\n        objective,\n        x0=[total_volume / len(vendors)] * len(vendors),\n        bounds=bounds,\n        constraints=[\n            LinearConstraint(np.ones(len(vendors)), \n                           total_volume, total_volume)  # Sum = total\n        ]\n    )\n    \n    optimal_allocation = result.x\n    \n    return {\n        'allocation': optimal_allocation,\n        'total_cost': objective(optimal_allocation),\n        'risk_score': calculate_portfolio_risk(optimal_allocation),\n        'savings': current_cost - objective(optimal_allocation)\n    }\n```\n\n---\n\n## Success Metrics\n\n- Cost reduction: €10M (10% savings)\n- Vendor onboarding time: Reduced 50%\n- Supply chain resilience: Improved (fewer single sources)\n\n---\n\n## Related Use Cases\n\n- **Intelligent Negotiation** (Similar: Supplier analysis)\n"}, {"num": "19", "short": "19 Touchless Transactions", "content": "# USE CASE 19: Touchless Transactions (GR & Invoice Workflows)\n\n## Quick Summary\nAutomated 3-way-match (PO → GR → Invoice) processing using rule-based classification. Classify discrepancies into 7 scenarios. Auto-approve when within tolerance. Escalate exceptions.\n\n---\n\n## Customer Pain Complaint\n\n**What you'd hear:**\n\"Our AP team spends days on 3-way matching. Goods receipt doesn't match PO, invoice has different amounts. 80% of matches are within tolerance but require manual review. We need automated approval for routine cases.\"\n\n**Business Impact:**\n- Current processing: 30 min per invoice\n- Manual review rate: 80%\n- Invoices/month: 5000\n- Opportunity: Save 200+ hours/month\n\n---\n\n## Your Approach\n\n### Phase 1: Data Collection\n\"Gather PO → GR → Invoice data\"\n\n### Phase 2: Comparison & Calculation\n\"Compare quantities and amounts:\n\n```\nPO quantity: 100 units @ €50 = €5000\nGR quantity: 100 units\nInvoice amount: €5000\n\nDifferences:\n- Quantity variance: 0%\n- Amount variance: 0%\n- Price variance: €50 vs. invoice price\n```\"\n\n### Phase 3: Rule-Based Classification\n\"Classify into scenarios:\n\n```\nSCENARIO 1: Perfect match\n  PO Qty = GR Qty = Invoice Qty\n  PO Amt = Invoice Amt\n  → AUTO-APPROVE\n\nSCENARIO 2: Within tolerance\n  Qty variance ≤ 2%\n  Amt variance ≤ 5%\n  → AUTO-APPROVE (after review)\n\nSCENARIO 3: Price variance only\n  Qty matches, price higher than PO\n  → FLAG for negotiation (renegotiate with vendor)\n\nSCENARIO 4: Quantity variance\n  GR qty > PO qty (overbilled)\n  → REJECT invoice for excess quantity\n\nSCENARIO 5: Missing GR\n  Invoice received, no goods receipt\n  → WAIT for GR (hold invoice)\n\nSCENARIO 6: Major discrepancy\n  Variance > 10%\n  → ESCALATE to AP manager\n\nSCENARIO 7: Duplicate invoice\n  Same invoice number already processed\n  → REJECT (fraud/error)\n```\"\n\n### Phase 4: Action & Escalation\n\"Route by scenario:\n\n```\nScenarios 1-2: Auto-approve (or auto-hold waiting for GR)\nScenarios 3-5: Route to appropriate team (negotiation, operations, etc.)\nScenario 6-7: Escalate to manager\n```\"\n\n### Phase 5: Audit Trail\n\"Log every decision:\n\n```\n- Scenario classification\n- Amounts compared\n- Decision (approve/hold/reject)\n- Approver + timestamp\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Rules, Not ML\n\n**What you'd say:**\n\"This is rule-based (not ML) because:\n\n✓ Business logic is deterministic (tolerance thresholds)\n✓ Compliance requires clear rules\n✓ Easy to explain to auditors\n✗ No training data needed\n✗ Easy to maintain and update\n\nML would be overkill—rules are simpler and more transparent.\"\n\n### Decision 2: 7 Scenarios\n\n**Why exactly 7?**\n\n```\n1: Perfect match (rare, but best)\n2: Within tolerance (most common, auto-approve)\n3: Price variance (negotiation needed)\n4: Qty variance (operations issue)\n5: Missing GR (timing issue)\n6: Major discrepancy (escalate)\n7: Duplicate (fraud/error check)\n\nThese cover 99% of real scenarios.\nEdge cases go to escalation.\n```\n\n---\n\n## Implementation\n\n```python\ndef classify_invoice_match(po, gr, invoice):\n    \"\"\"Classify into one of 7 scenarios\"\"\"\n    \n    # Calculate variances\n    qty_variance_pct = abs(gr['qty'] - po['qty']) / po['qty'] * 100\n    amt_variance_pct = abs(invoice['amt'] - po['amt']) / po['amt'] * 100\n    \n    # Scenario classification\n    if gr is None:\n        return 'SCENARIO_5_MISSING_GR'\n    \n    elif po['qty'] == gr['qty'] == invoice['qty'] and po['amt'] == invoice['amt']:\n        return 'SCENARIO_1_PERFECT_MATCH'\n    \n    elif qty_variance_pct <= 2 and amt_variance_pct <= 5:\n        return 'SCENARIO_2_WITHIN_TOLERANCE'\n    \n    elif gr['qty'] == po['qty'] and invoice['price'] > po['price']:\n        return 'SCENARIO_3_PRICE_VARIANCE'\n    \n    elif gr['qty'] != po['qty']:\n        return 'SCENARIO_4_QUANTITY_VARIANCE'\n    \n    elif qty_variance_pct > 10 or amt_variance_pct > 10:\n        return 'SCENARIO_6_MAJOR_DISCREPANCY'\n    \n    elif is_duplicate(invoice):\n        return 'SCENARIO_7_DUPLICATE'\n    \n    else:\n        return 'SCENARIO_6_MAJOR_DISCREPANCY'  # Catch-all\n\n\ndef route_invoice(scenario, invoice):\n    \"\"\"Route invoice to appropriate team\"\"\"\n    \n    routes = {\n        'SCENARIO_1_PERFECT_MATCH': ('AUTO_APPROVE', None),\n        'SCENARIO_2_WITHIN_TOLERANCE': ('AUTO_APPROVE_HOLD', 'ap_team'),\n        'SCENARIO_3_PRICE_VARIANCE': ('ROUTE_TO_NEGOTIATION', 'procurement'),\n        'SCENARIO_4_QUANTITY_VARIANCE': ('ROUTE_TO_OPERATIONS', 'receiving'),\n        'SCENARIO_5_MISSING_GR': ('WAIT_FOR_GR', None),\n        'SCENARIO_6_MAJOR_DISCREPANCY': ('ESCALATE', 'ap_manager'),\n        'SCENARIO_7_DUPLICATE': ('REJECT', None)\n    }\n    \n    action, team = routes.get(scenario)\n    \n    # Create task\n    task = {\n        'invoice_id': invoice['id'],\n        'scenario': scenario,\n        'action': action,\n        'assigned_to': team,\n        'timestamp': now(),\n        'audit_trail': [scenario]\n    }\n    \n    return task\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **Rule too strict, holds legitimate invoices** | Periodic calibration, track hold time |\n| **Price variance undetected** | Compare PO unit price vs. invoice price |\n| **Duplicate detection fails** | Hash invoice (number + vendor + amount) |\n| **Escalation queue grows** | Monitor queue depth, adjust thresholds |\n\n---\n\n## Success Metrics\n\n- Auto-approval rate: 60%+ (vs. current 0%)\n- Processing time: <5 minutes (vs. 30 min)\n- Invoice accuracy: >99%\n- Save 150+ hours/month\n\n---\n\n## Related Use Cases\n\n- **Purchase Order Extractor** (Upstream: PO creation)\n- **Anomaly Detection** (Similar: Variance detection, different domain)\n"}, {"num": "20", "short": "20 Utilities Rate Compare", "content": "# USE CASE 20: Utilities Rate Compare & Export\n\n## Quick Summary\nCompare utility tariffs (electricity, gas, water) across suppliers/time periods. Analyze usage patterns, project costs, recommend optimal plans. Export reports.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We have utility contracts from multiple suppliers. Understanding and comparing rates is complex. We want to optimize our utility spending and find better deals.\"\n\n**Business Impact:**\n- Current comparison: Manual, quarterly reviews\n- Potential savings: 10-15% on utility spend\n- Annual utility spend: €5M\n- Opportunity: €500k+/year\n\n---\n\n## Your Approach\n\n### Phase 1: Data Collection\n\"Upload utility bills/tariff documents:\n\n```\n- Supplier name, tariff name\n- Rate structure (fixed + variable)\n- Usage periods (peak, off-peak)\n- Surcharges, taxes, discounts\n```\"\n\n### Phase 2: Rate Parsing\n\"Extract rate from complex documents:\n\n```\n'Fixed charge: €50/month\nVariable: €0.15/kWh for 0-500 kWh\n         €0.12/kWh for 501-2000 kWh\n         €0.10/kWh for >2000 kWh'\n\nParsed:\n{\n  'fixed': 50,\n  'tiers': [\n    {'start': 0, 'end': 500, 'rate': 0.15},\n    {'start': 501, 'end': 2000, 'rate': 0.12},\n    {'start': 2001, 'end': null, 'rate': 0.10}\n  ]\n}\n```\"\n\n### Phase 3: Usage Analysis\n\"Analyze historical usage:\n\n```\n- Average monthly usage\n- Peak vs. off-peak usage\n- Seasonal patterns\n- Trend over time\n```\"\n\n### Phase 4: Cost Projection\n\"Project costs under different tariffs:\n\n```\nHistorical usage: 1200 kWh/month\nTariff A: €50 fixed + €0.15/kWh = €50 + €180 = €230/month\nTariff B: €30 fixed + €0.18/kWh = €30 + €216 = €246/month\nTariff C: €0 fixed + €0.16/kWh = €0 + €192 = €192/month\n\nRecommendation: Tariff C saves €38/month = €456/year\n```\"\n\n### Phase 5: Reporting\n\"Generate comparison reports:\n\n```\n- Side-by-side tariff comparison\n- Annual cost projection\n- Savings opportunity\n- Switch recommendation\n```\"\n\n---\n\n## Implementation\n\n```python\nimport streamlit as st\nimport pandas as pd\n\n# Upload tariff documents\nuploaded_files = st.file_uploader(\"Upload tariff docs\", accept_multiple_files=True)\n\ntariffs = []\nfor file in uploaded_files:\n    # Extract rate from document\n    rate_data = extract_tariff_rate(file)\n    tariffs.append(rate_data)\n\n# Historical usage\nusage_df = st.file_uploader(\"Upload usage history (CSV)\", type=['csv'])\nusage_data = pd.read_csv(usage_df)\n\n# Project costs\ndef project_cost(monthly_usage, tariff):\n    fixed = tariff['fixed']\n    variable_cost = 0\n    \n    for tier in tariff['tiers']:\n        usage_in_tier = min(monthly_usage - sum_of_prior_tiers, tier['end'] - tier['start'])\n        variable_cost += usage_in_tier * tier['rate']\n    \n    return fixed + variable_cost\n\n# Compare\ncomparison = []\navg_usage = usage_data['usage'].mean()\n\nfor tariff in tariffs:\n    annual_cost = project_cost(avg_usage, tariff) * 12\n    comparison.append({\n        'Supplier': tariff['supplier'],\n        'Annual Cost': annual_cost,\n        'Savings vs. Current': annual_cost - comparison[0]['Annual Cost']\n    })\n\n# Display\nst.write(\"Tariff Comparison\")\nst.dataframe(comparison)\n\n# Export\nst.download_button(\"Download report\", comparison.to_csv())\n```\n\n---\n\n## Success Metrics\n\n- Identify 10-15% savings opportunity\n- Reduce tariff analysis time by 80%\n- Automated bill validation\n\n---\n\n## Related Use Cases\n\n- **Utilities Tariff Mapping** (Similar: Tariff processing)\n"}, {"num": "21", "short": "21 Utilities Tariff Cockpit", "content": "# USE CASE 21: Utilities Tariff Mapping Cockpit\n\n## Quick Summary\nReact-based cockpit for managing utility tariffs. Map tariff structures to company billing systems. Track rate changes. Alert on optimization opportunities.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We have contracts with multiple utility suppliers. Rates change quarterly. We need centralized tracking of all rates and automatic alerts when better options become available.\"\n\n**Business Impact:**\n- Current tracking: Scattered emails, spreadsheets\n- Missed opportunities: 5-10 better deals per year\n- Potential savings: €200k+/year\n\n---\n\n## Your Approach\n\n### Phase 1: Tariff Master Data\n\"Build tariff database:\n\n```\n- Supplier, tariff name, effective date\n- Rate structure (fixed/variable/tiers)\n- Surcharges, discounts\n- Contract terms (duration, lock-in)\n```\"\n\n### Phase 2: React Cockpit UI\n\"Dashboard showing:\n\n```\n- All active tariffs (visual table)\n- Rate change alerts\n- Savings opportunities\n- Comparison tools\n- Contract renewal dates\n```\"\n\n### Phase 3: Rate Change Monitoring\n\"Alert when:\n\n```\n- Rates increase (review terms)\n- Better deal available (evaluate switch)\n- Contract renewal approaching (renegotiate)\n- Competitor offers better rate\n```\"\n\n### Phase 4: Optimization Engine\n\"Calculate savings:\n\n```\nCurrent spend: €500k/year\nCompetitor A: €480k/year (saves €20k)\nCompetitor B: €465k/year (saves €35k)\n\nSwitch cost: €5k (exit current, setup new)\nNet benefit: €30k/year\nPayback: 2 months\n```\"\n\n---\n\n## Implementation\n\n```typescript\n// React component for tariff cockpit\nimport React, { useState } from 'react';\n\nconst TariffCockpit = () => {\n  const [tariffs, setTariffs] = useState([]);\n  const [savings, setSavings] = useState(null);\n\n  useEffect(() => {\n    // Load tariffs from API\n    fetch('/api/tariffs')\n      .then(r => r.json())\n      .then(data => setTariffs(data));\n  }, []);\n\n  const calculateSavings = () => {\n    const current_cost = tariffs\n      .filter(t => t.is_active)\n      .reduce((sum, t) => sum + t.annual_cost, 0);\n\n    const best_alternative = Math.min(\n      ...tariffs.map(t => t.annual_cost)\n    );\n\n    setSavings(current_cost - best_alternative);\n  };\n\n  return (\n    <div className=\"cockpit\">\n      <h1>Utility Tariff Cockpit</h1>\n      \n      <div className=\"metrics\">\n        <Metric label=\"Annual Spend\" value={totalSpend} />\n        <Metric label=\"Savings Opportunity\" value={savings} />\n        <Metric label=\"Contract Renewals\" value={renewalCount} />\n      </div>\n\n      <table>\n        <tr>\n          <th>Supplier</th>\n          <th>Annual Cost</th>\n          <th>Valid Until</th>\n          <th>Status</th>\n        </tr>\n        {tariffs.map(t => (\n          <tr key={t.id}>\n            <td>{t.supplier}</td>\n            <td>{t.annual_cost}</td>\n            <td>{t.valid_until}</td>\n            <td>{t.is_active ? '✓ Active' : '○ Backup'}</td>\n          </tr>\n        ))}\n      </table>\n\n      <button onClick={calculateSavings}>Calculate Savings</button>\n    </div>\n  );\n};\n\nexport default TariffCockpit;\n```\n\n---\n\n## Success Metrics\n\n- Tariff visibility: 100% (all tracked)\n- Savings identified: €200k+/year\n- Alert latency: <1 day for opportunities\n- Switch time: Reduced 50%\n\n---\n\n## Related Use Cases\n\n- **Utilities Rate Compare** (Similar: Rate comparison, different UI)\n"}, {"num": "22", "short": "22 Agentic Chatbot Teams", "content": "# USE CASE 22: Agentic Chatbot (Teams Integration)\n\n## Quick Summary\nConversational bot deployed to Microsoft Teams using Microsoft Bot Framework. Integrates with SAP data. Handles employee queries: expense reports, leaves, IT tickets. Similar to Post-Sales Chatbot but for internal employees.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Our HR and IT teams field hundreds of employee questions daily. 'How many vacation days do I have?', 'What's my expense report status?', 'How do I reset my password?'. We need a bot that handles these self-service.\"\n\n**Business Impact:**\n- Current HR/IT support: 4 FTE\n- Queries/day: 200+\n- Opportunity: Save 60% of support time\n\n---\n\n## Your Approach\n\n### Phase 1: Intent Mapping\n\"Define employee intents:\n\n```\nHR queries:\n- Leave balance check\n- Expense report status\n- Benefits information\n- Payroll info\n\nIT queries:\n- Password reset\n- Access request\n- System status\n- Ticket tracking\n```\"\n\n### Phase 2: Teams Bot Framework\n\"Build bot on Microsoft Bot Framework:\n\n```\nIntegration:\n- Connect to Teams (via Teams API)\n- Authenticate via Azure AD (enterprise SSO)\n- Link to SAP for employee data\n```\"\n\n### Phase 3: LangGraph State Machine\n\"Multi-turn conversation:\n\n```\nUser: 'How many vacation days do I have?'\nBot: 'I'll look that up for you...'\nBot calls: get_leave_balance(employee_id)\nBot responds: 'You have 15 days remaining (2 planned for next month)'\n```\"\n\n### Phase 4: Action Execution\n\"For some queries, take action:\n\n```\nUser: 'I need to request 3 days off'\nBot: 'I can help with that. What dates?'\nUser: 'March 25-27'\nBot: 'Creating leave request for approval...'\nBot updates HR system\nBot: 'Your leave request #1234 submitted for approval'\n```\"\n\n### Phase 5: Escalation\n\"For complex questions:\n\n```\nUser: 'I have a complex compensation question'\nBot: 'This requires HR review. Connecting you with an HR specialist...'\nBot: Routes to HR team in Teams thread\nHuman takes over conversation\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Teams vs. Web UI\n\n**What you'd say:**\n\"I'd use Teams because:\n\n✓ Employees already use Teams (adoption)\n✓ Native notification (Adaptive Cards)\n✓ Integrated with identity (Azure AD)\n✓ Rich interaction (buttons, cards, threading)\n\nWeb UI would work but lower adoption (another system to learn).\"\n\n### Decision 2: Azure Bot Framework\n\n**What you'd say:**\n\"Bot Framework provides:\n\n✓ Teams integration built-in\n✓ Multi-turn conversation support\n✓ State management\n✓ Rich messaging (cards, buttons)\n\nCould build custom, but Bot Framework saves weeks.\"\n\n### Decision 3: LangGraph for Logic\n\n**What you'd say:**\n\"LangGraph for state machine:\n\n✓ Multi-turn conversations\n✓ Tool orchestration (call HR API, then IT API)\n✓ Error handling (if HR API fails, notify user)\n✓ Context persistence (remember employee throughout conversation)\"\n\n---\n\n## Implementation\n\n```python\nfrom langgraph.graph import StateGraph\nfrom azure.bot.builder import Bot, BotFrameworkAdapter\nfrom azure.identity import DefaultAzureCredential\nimport json\n\n# Teams bot\nadapter = BotFrameworkAdapter()\n\n@adapter.process_activity\nasync def on_message(turn_context):\n    # Get employee intent\n    message = turn_context.activity.text\n    \n    # LangGraph agent\n    result = await agent.invoke({\n        'messages': [{'role': 'user', 'content': message}],\n        'employee_id': turn_context.activity.from_property.id,\n        'channel': 'teams'\n    })\n    \n    # Send response\n    await turn_context.send_activity(f\"{result['response']}\")\n\n# Tools available to agent\ntools = {\n    'get_leave_balance': get_leave_balance,\n    'get_expense_status': get_expense_status,\n    'create_leave_request': create_leave_request,\n    'reset_password': reset_password,\n    'escalate_to_hr': escalate_to_hr\n}\n\n# LangGraph definition\ngraph = StateGraph(state_schema=BotState)\ngraph.add_node('interpret', interpret_intent)\ngraph.add_node('execute', execute_action)\ngraph.add_node('respond', generate_response)\n\ngraph.add_edge('interpret', 'execute')\ngraph.add_edge('execute', 'respond')\n```\n\n---\n\n## Success Metrics\n\n- 60% of queries self-served (no human needed)\n- Employee satisfaction: NPS > 60\n- HR/IT FTE savings: 2-3 FTE\n- Response time: <1 minute\n\n---\n\n## Related Use Cases\n\n- **Post-Sales Chatbot** (Similar: LLM + tools, different context)\n- **Email Agent** (Similar: Intelligent routing)\n"}, {"num": "23", "short": "23 Intelligent Procurement Contracts", "content": "# USE CASE 23: Intelligent Procurement Assistant with Contracts\n\n## Quick Summary\nContract-aware procurement: Extract and validate contracts, link to commodities, track contract terms (pricing, renewals), auto-flag when contract terms violated in orders.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We have contracts with suppliers with specific terms—pricing, volume discounts, exclusions. When orders come in, we don't consistently apply the contract terms. We need to enforce contracts automatically.\"\n\n**Business Impact:**\n- Current contract compliance: 70%\n- Lost revenue from missed discounts: €500k/year\n- Target: 95% compliance\n\n---\n\n## Your Approach\n\n### Phase 1: Contract Extraction & Storage\n\"Extract from contract documents:\n\n```\n- Supplier name, contract ID\n- Contract period (start, end, renewal)\n- Pricing: Base price, volume discounts, exclusions\n- Terms: Payment, delivery, warranties\n- Special conditions\n```\"\n\n### Phase 2: Contract Master Data\n\"Build HANA table:\n\n```\ncontract_id | supplier | commodity | unit_price | volume_threshold | discount\n-----------+-----------+-----------+----------+------------------+----------\nC001      | Vendor A  | Steel     | 100      | 1000            | 5%\nC001      | Vendor A  | Steel     | 95       | 5000            | 10%\n```\"\n\n### Phase 3: Order Processing with Contract Validation\n\"When order created:\n\n```\n1. Lookup supplier contract\n2. Check if item in contract\n3. Verify pricing aligns with contract\n4. Apply discounts automatically\n5. Flag if order violates contract terms\n```\"\n\n### Phase 4: Contract Term Tracking\n\"Monitor expiration:\n\n```\nContract C001 expires: 2024-06-30 (90 days away)\nAlert: 'Contract with Vendor A expiring soon. Start renegotiation.'\n```\"\n\n### Phase 5: Contract Compliance Reporting\n\"Report on compliance:\n\n```\n- % orders using contract pricing\n- Actual discount taken vs. eligible\n- Cost variance (should have saved more)\n```\"\n\n---\n\n## Implementation\n\n```python\ndef validate_order_against_contract(order, supplier_id):\n    # Look up contract\n    contract = get_contract(supplier_id)\n    \n    if not contract:\n        return {'status': 'NO_CONTRACT', 'warning': 'No contract found'}\n    \n    compliance = {'status': 'COMPLIANT', 'adjustments': []}\n    \n    for item in order['line_items']:\n        # Check if item in contract\n        contract_line = contract['line_items'].get(item['product_id'])\n        \n        if not contract_line:\n            compliance['adjustments'].append({\n                'product': item['product_id'],\n                'issue': 'NOT_IN_CONTRACT',\n                'action': 'FLAG for approval'\n            })\n            continue\n        \n        # Check pricing\n        contract_price = contract_line['unit_price']\n        order_price = item['unit_price']\n        \n        if order_price > contract_price:\n            compliance['adjustments'].append({\n                'product': item['product_id'],\n                'issue': 'OVERPRICE',\n                'order_price': order_price,\n                'contract_price': contract_price,\n                'action': 'Apply contract price'\n            })\n            item['unit_price'] = contract_price  # Auto-correct\n        \n        # Check volume discounts\n        volume = item['quantity']\n        for tier in contract_line['volume_tiers']:\n            if volume >= tier['threshold'] and tier['discount'] > 0:\n                compliance['adjustments'].append({\n                    'product': item['product_id'],\n                    'discount_applied': tier['discount']\n                })\n                item['unit_price'] *= (1 - tier['discount'])\n    \n    return compliance\n```\n\n---\n\n## Success Metrics\n\n- Contract compliance: 95%+\n- Cost savings from discount compliance: €500k+/year\n- Contract administration time: Reduced 60%\n\n---\n\n## Related Use Cases\n\n- **Intelligent Procurement Assistant** (Similar: Commodity extraction)\n- **Purchase Order Extractor** (Similar: Contract validation)\n"}];
