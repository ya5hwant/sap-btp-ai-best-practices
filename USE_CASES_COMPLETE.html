        // Embedded use cases data - ALL 23 USE CASES
        const useCasesData = [{"num": "01", "short": "01 Post Sales Chatbot", "content": "# USE CASE 1: Post-Sales Chatbot (Automotive Services)\n\n## Quick Summary\nConversational AI bot for automotive dealership customers—handles warranty status, service history, appointment scheduling. Uses LLM with tool orchestration (LangGraph) to maintain context and call multi-step APIs.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Our customers call support for simple questions—'When was my last service?', 'What's my warranty status?', 'Can I schedule an appointment?'. These are repetitive, consume support staff, and frustrate customers. We want conversational AI to handle these self-service.\"\n\n**Business Impact:**\n- 30-40% of support calls are routine/repetitive\n- Each call costs €5-10 in labor\n- Customer satisfaction drops due to wait times\n- Opportunity: Save €100k+/year with automation\n\n---\n\n## Discovery Questions (Show Strategic Thinking)\n\nAsk these **before** jumping to architecture:\n\n1. **\"How many customer inquiries per day are we talking about?\"** \n   - (Scope: 100s? 1000s? Affects infrastructure scale)\n2. **\"What are the top 5-10 customer questions we want the bot to handle?\"**\n   - (Not all questions—focus high-volume, low-complexity)\n3. **\"Do you have customer data in a central system or scattered across multiple systems?\"**\n   - (Affects data layer: HANA, API, CRM?)\n4. **\"What's your acceptable response time—real-time or is 2-3 seconds okay?\"**\n   - (Affects streaming, async design)\n5. **\"If the bot can't answer, what should happen?\"**\n   - (Escalation: Connect to agent? Email support? FAQ link?)\n\n**Why ask these first?**\n- Shows you understand scope before designing\n- Identifies constraints (compliance, data availability)\n- Helps estimate ROI and timeline\n\n---\n\n## Your Approach (Architecture Pitch)\n\n### Step 1: Scope the Data & Tools\n\"First, I'd identify what data the agent needs access to:\n- Customer profile (email, VIN, vehicle history)\n- Service records (dates, costs, parts, labor)\n- Warranty information (coverage, expiration)\n- Promotion/offer eligibility\n- Appointment slots availability\n\nFor MVP: Load into CSV/memory for fast prototyping. For production: HANA for concurrency + caching.\"\n\n### Step 2: Design the Agent Architecture (LangGraph)\n\"I'd use **LangGraph** for multi-turn reasoning:\n\n```\nWhy LangGraph (not Rasa/simple intent matching)?\n- Rasa: Black-box, hard to customize, limited to 1-turn\n- Simple intent: Can't maintain context for multi-step tasks\n- LangGraph: State machine for agents, tool orchestration, streaming\n```\n\nThe agent flow:\n```\nUser: \"When was my car last serviced?\"\n  ↓\nAgent decides: \"First identify customer by email, then fetch vehicles, then get service history\"\n  ↓\nCalls tools in sequence: find_client() → list_vehicles() → get_service_history()\n  ↓\nStreams results in real-time: \"Looking up your vehicle... Fetching history... Found 3 services\"\n```\"\n\n### Step 3: Define Tools (Agent Capabilities)\n\"I'd create these tools:\n\n```python\n# Tools the agent can call\ntools = {\n  'find_client': Find customer by email/phone/VIN,\n  'list_vehicles': Get all vehicles for customer,\n  'get_service_history': Fetch last 3 services,\n  'get_warranty_status': Check warranty coverage,\n  'get_promotions': Find applicable offers,\n  'schedule_appointment': Book service slot,\n  'get_documentation': Retrieve user manuals/guides\n}\n```\n\nEach tool:\n- Takes structured input (customer_id, vehicle_id)\n- Returns structured output (JSON)\n- Has clear error handling (tool fails → agent tries alternative)\n\"\n\n### Step 4: Streaming for Better UX\n\"Instead of waiting 5 seconds for full answer:\n- User sees: 'Looking up your vehicle...'\n- Then: 'Fetching service history...'\n- Then: 'Here are your last 3 services...'\n\nThis increases confidence + reduces bounce rate.\"\n\n### Step 5: Frontend & Deployment\n\"Stack choice:\n- **FastAPI**: Lightweight Python API, easy integration with LLM tools\n- **UI5 Web Components**: Enterprise chat UI, responsive, SAP-branded\n- **Cloud Foundry**: Scales horizontally (stateless API + Redis for sessions)\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: LangGraph (Not Traditional Chatbot Builders)\n\n**Trade-offs:**\n| Choice | Pros | Cons |\n|--------|------|------|\n| **LangGraph** | Custom logic, state control, streaming, any LLM | More code required |\n| **Rasa** | Simple intent, out-of-box NLU | Black-box, limited customization |\n| **Simple Rules** | Fast to build | No learning, brittle |\n\n**What you'd say:**\n\"Rasa is great for generic chatbots. We chose LangGraph because we need:\n- Multi-step reasoning (customer → vehicle → service history)\n- Integration with real SAP data\n- Custom business logic (warranty rules, appointment logic)\n- State persistence across turns\"\n\n### Decision 2: In-Memory CSV → HANA (Progressive)\n\n**Why phased approach?**\n\"MVP: Fast iteration with CSV\n- Load customers.csv, vehicles.csv, services.csv into memory\n- Perfect for <10k customers\n- Easier to test and validate\n\nProduction: HANA for scale\n- Handles 1M+ records\n- Concurrent access (multi-customer sessions)\n- Better caching + compression\n- Integrates with SAP ecosystem\"\n\n### Decision 3: Session Management\n\n**What you'd say:**\n\"For multiple bot instances (high availability):\n- **Option 1 (MVP)**: In-memory dict with 30-min timeout\n- **Option 2 (Production)**: Redis for distributed state\n  - Key: `session_{session_id}`\n  - Value: `{customer_id, vehicle_id, history}`\n  - TTL: 30 minutes for security\"\n\n---\n\n## Implementation Walk-Through\n\n### Example Conversation Flow\n\n```\nUser: \"Hi, I'm John. When was my last oil change?\"\n\nSTEP 1: Agent identifies customer\n  Tool: find_client(name=\"John\", context=user_email)\n  Result: customer_id=12345, vehicle_id=5\n  ✓ Now agent knows which customer\n  \nSTEP 2: Agent fetches service history\n  Tool: get_service_history(customer_id=12345, vehicle_id=5)\n  Result: [\n    {date: \"2024-01-15\", service: \"Oil change\", cost: \"$150\"},\n    {date: \"2023-10-22\", service: \"Tire rotation\", cost: \"$80\"},\n    {date: \"2023-07-10\", service: \"Alignment\", cost: \"$120\"}\n  ]\n  \nSTEP 3: Agent generates response\n  \"Your last oil change was January 15th, 2024. \n   Your next recommended service is in May 2024 based on mileage.\n   Would you like to schedule an appointment?\"\n   \nSTEP 4: User says \"Yes\"\n  Tool: schedule_appointment(vehicle_id=5, preferred_date=\"2024-05-11\")\n  Result: Appointment confirmed for May 11, 9:00 AM\n  Response: \"Your appointment is confirmed! You'll receive SMS reminder on May 10th.\"\n```\n\n### Error Handling Example\n\n```\nUser: \"When's my warranty expiring?\"\nAgent: \"Looking for warranty info...\"\nTool: get_warranty_status() → ERROR (data not available)\n\nInstead of hallucinating:\nAgent: \"I don't have warranty data in my system. \n        Let me connect you with a specialist...\"\n         \n→ Falls back to human agent with context\n```\n\n### Code Skeleton (Python)\n\n```python\nfrom langgraph.graph import StateGraph\nfrom fastapi import FastAPI\n\n# Define tools\ndef find_client(email: str) -> dict:\n    customer = customers[customers['email'] == email].iloc[0]\n    return {\"customer_id\": customer['id'], \"name\": customer['name']}\n\ndef get_service_history(customer_id: int) -> list:\n    records = services[services['customer_id'] == customer_id].tail(3)\n    return records.to_dict('records')\n\n# Define agent graph\ngraph = StateGraph(state_schema=AgentState)\ngraph.add_node(\"identify_customer\", find_client_node)\ngraph.add_node(\"fetch_history\", get_service_history_node)\ngraph.add_node(\"generate_response\", llm_response_node)\n\n# Add edges (workflow)\ngraph.add_edge(\"identify_customer\", \"fetch_history\")\ngraph.add_edge(\"fetch_history\", \"generate_response\")\n\n# FastAPI endpoint\n@app.post(\"/chat\")\nasync def chat(message: str, session_id: str):\n    result = graph.invoke(\n        {\"messages\": [message], \"session_id\": session_id},\n        stream_mode=\"updates\"  # Enable streaming\n    )\n    return result\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Probability | Impact | Mitigation |\n|------|-------------|--------|-----------|\n| **Agent calls wrong tool** | Medium | User confusion | Pre-flight validation: check tool exists, params required |\n| **LLM hallucinates data** | Medium | Loss of trust | Constrain LLM to tool results only (no free-form responses) |\n| **Session timeout mid-conversation** | Low | Poor UX | Log conversation, allow resume, show timeout message |\n| **Tool slow (>5 sec)** | Medium | Timeout | Implement timeout + graceful fallback (\"Service busy...\") |\n| **Tool fails completely** | Low | Bot failure | Error handler tells agent: \"That didn't work, try alternative\" |\n| **Rate limiting on LLM API** | Low | Bot unavailable | Queue-based approach + budget per customer |\n| **Privacy/Data leaks** | High | Compliance risk | Audit log every tool call, encryption at rest |\n\n**What you'd say:**\n\"The biggest risk is the agent getting confused and calling wrong tools. I prevent this by:\n1. Detailed tool descriptions in system prompt\n2. Pre-flight validation before execution\n3. Clear error messages that guide agent to retry\n4. Monitoring dashboard showing error rates per tool\"\n\n---\n\n## Success Metrics\n\n### Financial ROI\n- **Calls handled**: 30-40% of support volume → €100k/year savings\n- **Cost per interaction**: LLM cost €0.01 vs. agent €5 → 500x cheaper\n- **Time to resolution**: 1 min (bot) vs. 10 min (human)\n\n### User Metrics\n- **Satisfaction**: NPS > 50 (target: customer feels served)\n- **Repeat usage**: >60% of customers return for self-service\n- **Escalation rate**: <5% of conversations escalate to human\n\n### Technical Metrics\n- **Response time**: <2 seconds (user doesn't feel lag)\n- **Tool success rate**: >95% (tools work reliably)\n- **Session timeout rate**: <0.1% (sessions stable)\n\n---\n\n## Interview Tips\n\n**If asked \"What if customer context is scattered across 3 different systems?\"**\n- Answer: \"I'd implement an abstraction layer that queries all 3 in parallel. Cache results in HANA for future lookups. This keeps the agent simple while fetching data from anywhere.\"\n\n**If asked \"How do you handle ambiguous customer names like 'John'?\"**\n- Answer: \"I'd ask for clarification: 'I found 3 Johns. Can you provide your email or vehicle VIN?' Then disambiguate. If time-sensitive, escalate to human who can see customer history.\"\n\n**If asked \"What about multilingual support?\"**\n- Answer: \"LLM handles this naturally. I'd store customer preferred language in profile. Prompt directs LLM to respond in that language.\"\n\n---\n\n## Related Use Cases\n\n- **Email Agent** (Similar pattern: LLM + tool orchestration, but for email processing)\n- **Agentic Chatbot** (Variation: Teams integration instead of web UI)\n- **Customer Credit Check** (Different: Rule-based instead of LLM-based)\n"}, {"num": "02", "short": "02 Anomaly Detection", "content": "# USE CASE 2: Anomaly Detection in Sales Orders\n\n## Quick Summary\nDetect unusual sales orders (fraud, data entry errors, unusual discounts) using unsupervised ML. Isolation Forest scores orders in real-time. SHAP explains why each order is flagged. LLM translates explanations into business language.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We're seeing unusual orders slip through—sometimes fraudulent, sometimes data entry errors. Last month we lost €50k on a huge discount given to a new customer. We need to flag high-risk orders automatically without creating so many false positives that our team ignores the system.\"\n\n**Business Impact:**\n- Current loss rate: €500k/year in anomalies\n- Current false positive: 40% (team ignores alerts)\n- Target: Catch 80% of anomalies with <5% false positives\n\n---\n\n## Discovery Questions\n\n1. **\"How many orders per day are we processing?\"**\n   - (100s? 1000s? 10,000s? Affects architecture: real-time vs. batch)\n2. **\"What causes orders to be 'anomalous'?\"** (Show customer you understand)\n   - Unusual discount depth? (70% discount vs. normal 10%)\n   - New customer with large order? (€100k first order)\n   - Product mix never seen before?\n   - Order at 2 AM? (Orders normally 9 AM-5 PM)\n   - From unusual geography?\n3. **\"How many false positives can your team tolerate?\"**\n   - (If 50% false positives, team will ignore system)\n4. **\"Do you have historical data of known anomalies?\"**\n   - (Labeled data → supervised learning. Unlabeled → unsupervised)\n5. **\"If we flag an order, what happens next?\"**\n   - (Manual review? Auto-deny? Escalate to manager?)\n\n---\n\n## Your Approach\n\n### Phase 1: Understand the Baseline\n\"Before building any model, I'd ask: What are your current false positive and false negative rates?\n\nExample baseline:\n- Current: 5% false positive (manual review catches noise)\n- Current: 20% miss rate (anomalies slip through)\n- **ROI target**: Catch 80% of anomalies, maintain <1% false positive rate\n- **Financial impact**: 80% of €500k anomalies = €400k savings, minus €5k review costs = €395k net\"\n\n### Phase 2: Feature Engineering (Critical)\n\"I'd identify features that distinguish normal from anomalous orders:\n\n```\nCustomer history features:\n- How many orders from this customer before? (1st order = higher risk)\n- What's typical order size? (Is this 10x their average?)\n- What's typical order value? (€10k order from €1k customer = anomaly)\n- Days since last order? (New customer after 1 year = risky)\n\nOrder characteristics:\n- Discount depth: Is 70% discount unusual? (Normal: 10%, Unusual: >30%)\n- Product mix: Do these products normally sell together?\n- Order timing: Is 2 AM order unusual? (Order pattern by hour)\n- Margin: Would this order lose money?\n\nGeographic/seasonal:\n- From typical region?\n- Typical quarter for this product?\n```\n\nWhy features matter:\n- Capture business logic without hard-coding rules\n- Model learns which features correlate with anomalies\n- SHAP explains predictions via features\"\n\n### Phase 3: Model Selection (Isolation Forest)\n\"I'd use **Isolation Forest** for several reasons:\n\n```python\nfrom sklearn.ensemble import IsolationForest\n\n# Why IF?\n✓ No labeled training data needed (unsupervised)\n✓ Fast training & prediction (O(n) complexity)\n✓ Interpretable (SHAP works well with trees)\n✓ Handles mixed data types (numeric + categorical)\n✓ Outliers naturally isolated\n\n✗ Not: Neural networks (need 1000s of labeled anomalies)\n✗ Not: Simple rules (miss complex patterns)\n✗ Not: One-Class SVM (slower, less interpretable)\n```\"\n\n### Phase 4: Explainability (The Critical Part)\n\"Anomaly detection is useless if users don't trust it. I'd add **two layers** of explanation:\n\n**Layer 1 - SHAP (Technical Explainability):**\n```python\nimport shap\n\nexplainer = shap.TreeExplainer(isolation_forest)\nshap_values = explainer.shap_values(order_features)\n\n# Output: Show which features pushed score toward anomalous\nprint(f\"Score: 0.85 (anomalous) because:\")\nprint(f\"  - 10x order size: +0.4\")\nprint(f\"  - High discount (70%): +0.3\")\nprint(f\"  - New customer: +0.15\")\n```\n\n**Layer 2 - LLM Explanation (Business Language):**\n```python\nexplanation = llm.generate(f'''\n  Order anomaly explanation:\n  Score: 0.85 (highly anomalous)\n  SHAP drivers: Order size 10x normal, discount 70%, new customer\n  \n  Write in plain English for business user.\n''')\n# Output: 'This order is unusual because John Corp (new customer) is buying \n#          1000 units (normally 50-100), with a 60% discount. \n#          We recommend manual review.'\n```\n\nThis dual-layer approach builds trust.\"\n\n### Phase 5: Fine-Tuning Interface\n\"I'd build a UI where analysts can:\n- Adjust contamination rate (how many anomalies expected? 1%? 5%?)\n- Enable/disable specific features\n- Set confidence thresholds (only flag >0.9 confidence)\n- See real-time impact on false positive rate\n\nThis gives them control + confidence in the system.\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Batch vs. Real-Time Scoring\n\n**What you'd say:**\n\"For V1, I'd do **batch scoring**:\n- Every 4 hours, re-score all open orders\n- Updates dashboard with flagged orders\n- Alerts on new anomalies\n\nWhy batch?\n- Faster to build (no complex streaming infrastructure)\n- More accurate (can look at full day's context)\n- Cost-effective (one batch job vs. per-order API calls)\n- Sufficient for most workflows\n\nFuture: Real-time scoring if needed.\"\n\n### Decision 2: Model Retraining\n\n**What you'd say:**\n\"Retraining schedule:\n- **Weekly**: Retrain on last 12 months of data\n- **Trigger**: If model performance drops below 80% precision\n- **Versioning**: Keep last 5 model versions for rollback\n\nProcess:\n1. Training: Use analyst-validated decisions (what they marked as anomaly)\n2. Validation: Test on holdout 20% of orders\n3. Comparison: Is new model better than current? If yes → deploy. If no → keep current.\"\n\n### Decision 3: Storage & Scalability\n\n**Stack:**\n- **HANA**: Store orders + features + anomaly scores\n  - Columnar storage: Fast aggregation queries\n  - Indexes: Fast lookup by customer/order_id\n  - Partitioning: By date for old order archive\n  - Vector search: Could add for semantic similarity\n- **Redis**: Cache model + recent anomaly flags\n- **ML Pipeline**: Batch job (can be hourly/daily)\n\n---\n\n## Implementation Walk-Through\n\n### Example Score Interpretation\n\n```\nOrder: €150k to new customer, 60% discount, 2 AM\n\nFeature values:\n- customer_age_days: 0 (new customer) → high anomaly signal\n- order_size_ratio: 10 (10x normal) → high anomaly signal  \n- discount_depth: 0.60 (vs. normal 0.10) → high anomaly signal\n- order_hour: 2 (vs. normal 9-17) → medium anomaly signal\n\nIsolation Forest Score: 0.85 (0=normal, 1=anomalous)\n\nSHAP Explanation:\n- customer_age_days=0: contributes +0.4\n- order_size_ratio=10: contributes +0.3\n- discount_depth=0.60: contributes +0.15\n\nHuman-readable: \"New customer buying 10x normal amount with 60% discount \n                  at 2 AM. Recommend review.\"\n```\n\n### Code Skeleton\n\n```python\nfrom sklearn.ensemble import IsolationForest\nfrom sklearn.preprocessing import StandardScaler\nimport shap\n\n# Training\nfeatures = ['customer_age_days', 'order_size_ratio', 'discount_depth', 'order_hour']\nX_train = orders[features].fillna(0)\nX_train_scaled = StandardScaler().fit_transform(X_train)\n\nmodel = IsolationForest(contamination=0.05)  # Expect 5% anomalies\nmodel.fit(X_train_scaled)\n\n# Inference\nnew_orders = incoming_orders[features]\nnew_orders_scaled = StandardScaler().transform(new_orders)\nanomaly_scores = model.score_samples(new_orders_scaled)  # -1 to 0 scale\n\n# Explainability\nexplainer = shap.TreeExplainer(model)\nshap_values = explainer.shap_values(new_orders_scaled)\n\n# Flag anomalies\nflagged = new_orders[anomaly_scores < -0.5]  # Score < -0.5 = anomalous\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **False positive rate too high** | Start conservative (high confidence threshold 0.8+), gradually lower as confidence increases |\n| **Model degrades over time** | Drift detection: monitor prediction distribution, retrain if changes >5% |\n| **Stakeholders don't trust model** | Weekly calibration meetings, show ROI metrics, explain top features |\n| **Model catches fraud but customer can't pay** | Add payment capacity check as separate tool |\n| **Explainability doesn't work** | A/B test explanations with users, iterate based on feedback |\n\n---\n\n## Success Metrics\n\n**Financial:**\n- Catch 80% of anomalies → €320k savings annually\n- Maintain <5% false positive rate (analysts trust system)\n\n**Operational:**\n- Mean time to detect: <30 min\n- Review time per flag: <5 min\n- System uptime: >99.5%\n\n**User Adoption:**\n- 90% of order reviewers use the dashboard\n- NPS score >60\n- Escalation handling: <1% user overrides of recommendation\n\n---\n\n## Interview Tips\n\n**If asked \"Why not deep learning?\"**\n- Answer: \"Deep learning needs labeled training data (1000s of anomalies). You don't have that. Isolation Forest needs zero labeled data and is 100x faster. Unless you have massive labeled dataset, tree-based anomaly detection wins.\"\n\n**If asked \"How do you handle class imbalance?\"**\n- Answer: \"Anomalies are rare (5% of orders). Isolation Forest doesn't care about imbalance—it doesn't learn 'anomaly' vs. 'normal', it isolates outliers. This is why it's better than supervised models for anomaly detection.\"\n\n**If asked \"What about false negatives?\"**\n- Answer: \"Set lower contamination rate (expect 10% anomalies instead of 5%) to be more aggressive. Or reduce score threshold (flag >0.7 instead of >0.8). Trade-off: higher false positives but lower false negatives.\"\n\n---\n\n## Related Use Cases\n\n- **Document Outlier Detection** (Similar: Unsupervised outlier detection, different domain)\n- **Video Incident Detection** (Different: Vision-based, threshold-based rules)\n"}, {"num": "03", "short": "03 Customer Credit Check", "content": "# USE CASE 3: Customer Credit Check\n\n## Quick Summary\nAutomated credit decision pipeline: Extract credit documents (KYC, CSF, payment history) → Validate consistency → Apply policy rules → Generate audit report. Emphasis on compliance, explainability, traceability.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Our credit evaluation is manual and inconsistent. We receive documents from customers—KYC forms, CSF, vendor comments, payment history. One analyst says 'approve', another says 'deny'. We need:\n- Consistent data extraction\n- Validation across documents (does everything match?)\n- Automated policy application\n- Compliance audit trail\"\n\n**Business Impact:**\n- Process time: 1 day (need: 2 hours)\n- Inconsistency: ±20% variance between analysts\n- Compliance risk: Audit trails incomplete\n\n---\n\n## Discovery Questions\n\n1. **\"Walk me through your current credit evaluation process.\"**\n   - (Understand current state)\n2. **\"How many documents per credit application?\"**\n   - (3? 5? 10? Affects document handling strategy)\n3. **\"What's acceptable accuracy for automated extraction?\"**\n   - (95%? 99%? Affects need for human review)\n4. **\"Who makes the final approval decision—algorithm or human?\"**\n   - (Compliance question: AI assists vs. AI decides)\n5. **\"What policies govern credit decisions?\"**\n   - (Company-specific thresholds, compliance rules)\n6. **\"Do you have historical credit decisions to learn from?\"**\n   - (Labeled data for ML, or pure rule-based?)\n\n---\n\n## Your Approach\n\n### Stage 1: Document Extraction\n\"I'd use **SAP Document AI** for structured documents:\n\n```\nWhy SAP Document AI?\n✓ Pre-trained on financial documents (KYC, CSF forms)\n✓ High accuracy (95%+) on standard forms\n✓ Confidence scores (I know which extractions are risky)\n✓ Returns structured JSON with field-level confidence\n\nFor less structured docs:\n- Use LLM vision for document understanding\n- Fall back to manual OCR + extraction if needed\n```\n\n**What gets extracted:**\n- KYC: Company name, RFC, address, director names, registration date\n- CSF (Consolidated Statement of Financial): Revenue, expenses, net income, assets\n- Vendor comments: Payment history, reliability, issues\n- Payment history: Days late, payment rate\"\n\n### Stage 2: Validation (Cross-Document Consistency)\n\"This is critical—inconsistencies signal either fraud or poor data quality:\n\n```\nValidation checks:\n✓ RFC number matches across KYC and CSF\n✓ Company names match (spelling variations acceptable)\n✓ Addresses consistent (HQ vs. operational)\n✓ Director names appear in vendor history (trust signal)\n✓ Dates make sense (registration before CSF, before now)\n✓ Financial data plausible (revenue > expenses)\n```\n\n**Validation score:**\n- 100%: All checks passed → proceed to scoring\n- 70-100%: Most checks passed → flag for review\n- <70%: Major inconsistencies → request new documents or deny\"\n\n### Stage 3: Credit Policy Engine\n\"Pure rule-based (no ML) because:\n\n```\nWhy rules, not ML?\n✓ Compliance requirement: Need explainability per decision\n✓ Policy changes frequently: Easy to update rules\n✓ Audit trail: Clear reasoning for every decision\n✗ ML: Black-box, hard to explain to regulators\n```\n\n**Sample policy:**\n```\nIF CAL_Score >= 80:\n  Recommendation = APPROVE\n  Limit = UNLIMITED\n  \nELIF CAL_Score >= 60 AND Payment_Score >= 75:\n  Recommendation = APPROVE_WITH_CONDITIONS\n  Limit = €50,000\n  Conditions: Monthly reporting required\n  \nELIF CAL_Score >= 40 AND Director_Approval_Available:\n  Recommendation = ESCALATE_TO_DIRECTOR\n  \nELSE:\n  Recommendation = DENY\n```\"\n\n### Stage 4: Scoring Layers\n\"I'd calculate multiple scores to feed the rules:\n\n```\nCAL Score (80-point scale):\n  - 20pts: Company age (>10yrs: 20pts, <3yrs: 5pts)\n  - 30pts: Financial health (revenue/expense ratio)\n  - 20pts: Liquidity (cash position)\n  - 10pts: Industry risk (some industries higher risk)\n\nC3M Score (90-day performance):\n  - 50pts: On-time payment rate\n  - 25pts: Average payment delay\n  - 25pts: Order fulfillment rate\n\nRisk Score:\n  - Composite of CAL + C3M + industry + geography\n```\"\n\n### Stage 5: Reporting & Audit\n\"Every credit decision produces:\n\n```\nOutput artifacts:\n1. Executive Summary (2 pages)\n   - Company name, scores, recommendation\n   - Key factors driving decision\n   - Next steps\n\n2. Detailed Analysis (5+ pages)\n   - All extracted data with confidence\n   - Validation checks results\n   - Policy rules applied\n   - Comparable precedents\n\n3. Audit Trail\n   - Timestamp, user approver\n   - Any manual overrides with reasoning\n   - Document version numbers\n   - Extraction confidence scores\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Phased Approach (Extract → Validate → Score → Report)\n\n**What you'd say:**\n\"I break this into stages because each stage can be tested independently:\n\n1. **Extract**: Did we get the data right?\n2. **Validate**: Is the data consistent?\n3. **Score**: Is the score fair?\n4. **Report**: Is the recommendation clear?\n\nIf validation fails, we know it's not an extraction problem. This modular design makes debugging easier and builds confidence through stages.\"\n\n### Decision 2: Human Review Workflow\n\n**What you'd say:**\n\"The system doesn't decide—it **recommends**. We implement three workflows:\n\n```\nHigh Confidence (>95% extraction + validation):\n  → System recommends APPROVE/DENY\n  → Analyst clicks approve (mostly automated)\n  \nMedium Confidence (70-95%):\n  → System shows reasoning\n  → Analyst reviews, makes decision\n  \nLow Confidence (<70%):\n  → Request additional documents\n  → OR escalate to manual review\n```\n\nThis keeps humans in the loop while automating routine cases.\"\n\n### Decision 3: Multi-Currency & Regional Policies\n\n**What you'd say:**\n\"Different regions have different thresholds:\n- Mexico: €100k base limit, 50% CAL required\n- USA: €250k base limit, 60% CAL required\n- EU: €500k base limit, 70% CAL required\n\nI'd implement:\n- Store limits in policy table (easy to update)\n- Support region-specific policy versions\n- Version control all policies (Git-based)\n- A/B test new policies on historical data before deploying\"\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **Document extraction fails** | Pre-process PDFs (contrast enhance, deskew), fall back to manual OCR |\n| **Validation rejects legitimate applications** | Flag for review instead of auto-reject, show what failed |\n| **Policy too strict/lenient** | A/B test on historical data, quarterly calibration meetings |\n| **Director override not tracked** | Log all overrides with reasoning, timestamp, approval |\n| **Regulatory audit fails** | Implement complete audit trail: extractions + validation + policy application + approver |\n| **Extraction confidence too low** | Accept lower confidence for trusted vendors, but note in audit trail |\n\n---\n\n## Success Metrics\n\n**Speed:**\n- Reduce from 1 day to 2 hours (7x faster)\n- Automate 60% of decisions (no human needed)\n\n**Consistency:**\n- Approval rate variance <5% across analysts (vs. current ±20%)\n- Policy adherence: 100% (vs. current 80%)\n\n**Accuracy:**\n- 95%+ match with manual extractions\n- Default rate of approved customers <2% (vs. current 3%)\n\n**Compliance:**\n- 100% audit trail completeness\n- Zero regulatory findings on credit decisions\n- Full traceability: decision → documents → policy rules\n\n**Financial:**\n- Cost per decision: €2 (vs. €10 manual)\n- 40-50% FTE savings in credit team\n\n---\n\n## Interview Tips\n\n**If asked \"Shouldn't we use ML to predict default risk?\"**\n- Answer: \"Credit decisions are compliance-driven, not optimization-driven. We need to explain every decision to regulators. ML would be a black-box. However, we could use ML to **optimize** policy thresholds based on historical default rates. That's a secondary optimization after the primary rule-based system is working.\"\n\n**If asked \"How do you handle data quality issues?\"**\n- Answer: \"Three-tier approach: \n  1) Validation layer catches inconsistencies\n  2) Low-confidence flags trigger human review\n  3) If extraction fails, request new documents from customer\n  This prevents garbage in → garbage out.\"\n\n**If asked \"What about fraud?\"**\n- Answer: \"Credit evaluation focuses on creditworthiness. Fraud detection is separate:\n  - Cross-check documents with government registries (RFC, business license)\n  - Flag unusual patterns (director changes, HQ changes)\n  - Vendor comments as fraud signal\n  - Would use anomaly detection model if historical fraud data available.\"\n\n---\n\n## Related Use Cases\n\n- **Purchase Order Extractor** (Similar: Document extraction + validation)\n- **AI PDF Information Extraction** (Similar: Document understanding, different goal)\n"}, {"num": "04", "short": "04 Diagram to BPMN", "content": "# USE CASE 4: Diagram-to-BPMN Converter\n\n## Quick Summary\nConvert hand-drawn or Visio business process diagrams to BPMN XML format. Uses vision LLM (Claude, GPT-4o) to understand diagram structure. Returns standard BPMN for import into SAP Build/Signavio.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Our business analysts draw process diagrams on whiteboards or Visio. Converting them to BPMN format for SAP Build is manual—I spend hours redrawing in Signavio. We need to automate this.\"\n\n**Business Impact:**\n- Current conversion: 2 hours per diagram\n- Diagrams created: 20/month\n- Opportunity: Save 40 hours/month = 1 FTE\n\n---\n\n## Discovery Questions\n\n1. **\"What formats are these diagrams in?\"** (Visio, images, hand-drawn scans, PDFs?)\n2. **\"How complex are they?\"** (5 steps? 50 steps? Swimlanes?)\n3. **\"What happens with the BPMN output?\"** (Imported to Signavio? SAP Build directly?)\n4. **\"How often do you create diagrams?\"** (Weekly? Monthly?)\n5. **\"Are diagrams mostly consistent or wildly different?\"** (Affects prompt engineering)\n\n---\n\n## Your Approach\n\n### Step 1: Vision Analysis\n\"User uploads diagram → encode as base64 → send to **vision LLM** (Claude 3.5 Sonnet or GPT-4o).\n\nThe LLM's job:\n- Identify all activities/tasks (rectangles with labels)\n- Find decision points (diamonds with conditions)\n- Spot start/end events (circles)\n- Trace flow connections (arrows with labels)\n- Recognize swimlanes (if present)\n- Detect text annotations\"\n\n### Step 2: Structured Extraction\n\"I'd use this prompt:\n\n```\nAnalyze this business process diagram and extract:\n1. All activities (name, type: userTask, serviceTask, automaticTask)\n2. Decision points (condition/label on each path)\n3. Start and end events\n4. Connections (flows between elements)\n5. Swimlanes (if present) and element ownership\n\nReturn valid JSON:\n{\n  'activities': [\n    {'id': 'task1', 'name': 'Review Order', 'type': 'userTask'},\n    {'id': 'task2', 'name': 'Calculate Price', 'type': 'serviceTask'},\n    {'id': 'gate1', 'name': 'Approved?', 'type': 'exclusiveGateway'}\n  ],\n  'flows': [\n    {'from': 'task1', 'to': 'gate1', 'label': ''},\n    {'from': 'gate1', 'to': 'task2', 'label': 'Yes'},\n    {'from': 'gate1', 'to': 'reject', 'label': 'No'}\n  ],\n  'startEvent': 'start1',\n  'endEvent': 'end1'\n}\n```\n\nWhy JSON? \n- Easy to validate (check all fields present)\n- Trivial to convert to BPMN XML\n- User can edit before final generation\"\n\n### Step 3: BPMN XML Generation\n\"Convert JSON to BPMN using templates:\n\n```xml\n<?xml version=\"1.0\"?>\n<bpmn2:definitions xmlns:bpmn2=\"http://www.omg.org/spec/BPMN/20100524/MODEL\">\n  <bpmn2:process id=\"process1\" name=\"Main Process\">\n    \n    <!-- Start Event -->\n    <bpmn2:startEvent id=\"start1\" name=\"Order Received\"/>\n    \n    <!-- User Tasks -->\n    <bpmn2:userTask id=\"task1\" name=\"Review Order\">\n      <bpmn2:incoming>flow0</bpmn2:incoming>\n      <bpmn2:outgoing>flow1</bpmn2:outgoing>\n    </bpmn2:userTask>\n    \n    <!-- Service Tasks -->\n    <bpmn2:serviceTask id=\"task2\" name=\"Calculate Price\">\n      <bpmn2:incoming>flow2</bpmn2:incoming>\n      <bpmn2:outgoing>flow3</bpmn2:outgoing>\n    </bpmn2:serviceTask>\n    \n    <!-- Decision Gateway -->\n    <bpmn2:exclusiveGateway id=\"gate1\" name=\"Approved?\">\n      <bpmn2:incoming>flow1</bpmn2:incoming>\n      <bpmn2:outgoing>flow2</bpmn2:outgoing>\n      <bpmn2:outgoing>flow4</bpmn2:outgoing>\n    </bpmn2:exclusiveGateway>\n    \n    <!-- Sequence Flows (connections) -->\n    <bpmn2:sequenceFlow id=\"flow0\" sourceRef=\"start1\" targetRef=\"task1\"/>\n    <bpmn2:sequenceFlow id=\"flow1\" sourceRef=\"task1\" targetRef=\"gate1\"/>\n    <bpmn2:sequenceFlow id=\"flow2\" sourceRef=\"gate1\" targetRef=\"task2\" name=\"Yes\"/>\n    <bpmn2:sequenceFlow id=\"flow4\" sourceRef=\"gate1\" targetRef=\"reject\" name=\"No\"/>\n    \n    <!-- End Event -->\n    <bpmn2:endEvent id=\"end1\" name=\"Order Processed\">\n      <bpmn2:incoming>flow3</bpmn2:incoming>\n    </bpmn2:endEvent>\n    \n  </bpmn2:process>\n</bpmn2:definitions>\n```\"\n\n### Step 4: Validation\n\"Validate generated BPMN:\n1. **XSD schema**: Does it conform to BPMN 2.0 spec?\n2. **Connectivity**: Are all elements connected? Any orphaned tasks?\n3. **Gateway semantics**: Do gateways have 2+ outgoing flows?\n4. **Start/End**: Process has exactly 1 start + 1+ end events?\n\n```python\nfrom lxml import etree\n\n# Validate against BPMN schema\nbpmn_schema = etree.XMLSchema(file='bpmn20.xsd')\nis_valid = bpmn_schema.validate(bpmn_tree)\nif not is_valid:\n  print(bpmn_schema.error_log)  # Show validation errors\n```\"\n\n### Step 5: Preview & Export\n\"Show user:\n1. **Visual preview** (render BPMN diagram)\n2. **JSON structure** (editable fields)\n3. **Validation report** (any issues?)\n4. **Download options** (BPMN XML for Signavio, for SAP Build)\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Multi-Model Fallback\n\n**What you'd say:**\n\"Vision models vary in quality. I'd implement fallback:\n\n1. Try Claude 3.5 Sonnet (best for diagrams, good context window)\n2. If fails, try GPT-4o (alternative, slightly different understanding)\n3. If fails, try Gemini 2.5 Pro (third-party check)\n4. If all fail, show user extracted JSON for manual correction\n\nThis ensures we never fail completely.\"\n\n### Decision 2: Human Correction Workflow\n\n**What you'd say:**\n\"Even if LLM extraction is 85% right, that 15% wrong matters. So:\n\n1. Show extracted JSON (editable)\n2. User corrects: rename activities, add/remove flows, fix connections\n3. Regenerate BPMN from corrected JSON\n4. Export to Signavio\n\nThis is 85% automatic + 15% human, which is 8x faster than 100% manual.\"\n\n### Decision 3: Handling Large Diagrams\n\n**What you'd say:**\n\"For large diagrams (50+ elements), the image becomes too complex:\n\n1. Split image into regions (top, middle, bottom)\n2. Analyze each region independently\n3. Use explicit mention of flows between regions\n4. Stitch together into complete BPMN\n\nAlternatively: Ask user to upload in sections if diagram is complex.\"\n\n---\n\n## Implementation Walk-Through\n\n### Code Skeleton\n\n```python\nimport base64\nimport anthropic\nimport json\nimport xml.etree.ElementTree as ET\n\n# Step 1: Encode image\nwith open('diagram.png', 'rb') as f:\n    image_data = base64.b64encode(f.read()).decode('utf-8')\n\n# Step 2: Send to Claude\nclient = anthropic.Anthropic()\nmessage = client.messages.create(\n    model=\"claude-3-5-sonnet-20241022\",\n    max_tokens=2048,\n    messages=[\n        {\n            \"role\": \"user\",\n            \"content\": [\n                {\n                    \"type\": \"image\",\n                    \"source\": {\n                        \"type\": \"base64\",\n                        \"media_type\": \"image/png\",\n                        \"data\": image_data,\n                    },\n                },\n                {\n                    \"type\": \"text\",\n                    \"text\": \"Extract business process diagram as JSON...\"\n                }\n            ],\n        }\n    ],\n)\n\n# Step 3: Parse JSON response\nextracted_json = json.loads(message.content[0].text)\n\n# Step 4: Generate BPMN XML\ndef json_to_bpmn(data):\n    root = ET.Element('bpmn2:definitions', xmlns='...')\n    process = ET.SubElement(root, 'bpmn2:process', id='process1')\n    \n    # Add elements\n    for activity in data['activities']:\n        ET.SubElement(process, 'bpmn2:' + activity['type'],\n                     id=activity['id'], name=activity['name'])\n    \n    # Add flows\n    for flow in data['flows']:\n        ET.SubElement(process, 'bpmn2:sequenceFlow',\n                     sourceRef=flow['from'], targetRef=flow['to'])\n    \n    return ET.tostring(root, encoding='unicode')\n\nbpmn_xml = json_to_bpmn(extracted_json)\n\n# Step 5: Validate\nvalidate_bpmn(bpmn_xml)\n\n# Step 6: Export\nwith open('output.bpmn', 'w') as f:\n    f.write(bpmn_xml)\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **LLM misidentifies task types** | Validate task types against BPMN spec, ask for clarification |\n| **Connections get lost** | Validate flow connectivity, highlight orphaned elements |\n| **Swimlanes incorrect** | LLM tends to miss swimlanes—ask explicit question in prompt |\n| **Output invalid BPMN** | XSD validation before export, show errors to user |\n| **Hand-drawn diagram illegible** | Pre-process: contrast enhancement, OCR if needed |\n\n---\n\n## Success Metrics\n\n**Speed:**\n- 5 minutes to convert (vs. 2 hours manual)\n- 90% of diagrams require <2 min manual correction\n\n**Accuracy:**\n- 95%+ structural match with manual BPMN (flows correct)\n- 100% BPMN spec compliance\n\n**Adoption:**\n- 80% of diagrams processed automatically\n- User satisfaction: \"Faster than manual\"\n\n**Cost:**\n- €1 per diagram (vs. €50 manual)\n- 20 diagrams/month → €20 vs. €1000 = €980 savings\n\n---\n\n## Related Use Cases\n\n- **Sales Order Extractor** (Similar: Structured extraction from documents)\n- **AI PDF Information Extraction** (Similar: Vision-based extraction)\n"}, {"num": "05", "short": "05 AI Log Analyzer", "content": "# USE CASE 5: AI Log Analyzer\n\n## Quick Summary\nIntelligent system log analysis: Ingest logs from multiple sources → Cluster similar errors → Prioritize by impact → Generate remediation recommendations → Link to SAP OSS notes.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We get thousands of error logs per day. Most are noise or repeats. Operators spend hours finding critical errors and figuring out what to do. We need intelligent filtering and SAP-aware remediation steps.\"\n\n**Business Impact:**\n- Current MTTR (mean time to resolution): 8 hours\n- Target: 30 minutes\n- Operator productivity: 50% of time spent sorting logs\n\n---\n\n## Discovery Questions\n\n1. **\"How many logs per day?\"** (1000s? 100k? 1M? Affects infrastructure)\n2. **\"Where do logs come from?\"** (App servers? DB? Middleware? All of above?)\n3. **\"What percentage are actually critical?\"** (1%? 5%?)\n4. **\"Do you have error codes mapping to OSS notes?\"** (If yes → can automate lookup)\n5. **\"Current process: Log detection to resolution time?\"** (30 min? 8 hours?)\n\n---\n\n## Your Approach\n\n### Phase 1: Log Ingestion & Normalization\n\"Collect logs from all sources and normalize:\n\n```\nRaw log: [2024-03-22 10:15:30.123 ERROR] RFC Timeout calling FM_EXECUTE_QUERY\n\nNormalized:\n{\n  'timestamp': '2024-03-22T10:15:30Z',\n  'source': 'app-server-01',\n  'severity': 'ERROR',\n  'error_code': 'RFC_TIMEOUT',\n  'message': 'Timeout calling RFC FM_EXECUTE_QUERY after 30s',\n  'stack_trace': '...',\n  'context': {\n    'function': 'FM_EXECUTE_QUERY',\n    'timeout_seconds': 30\n  }\n}\n```\n\nWhy normalize?\n- Fast search & filtering\n- Enables pattern detection\n- LLM can understand structured format\"\n\n### Phase 2: Intelligent Prioritization (LLM)\n\"Use LLM to assess each error:\n\n```\nFor each error_code, calculate:\n1. Severity (CRITICAL, HIGH, MEDIUM, LOW)\n   - Is this blocking users?\n   - How many systems affected?\n   \n2. Impact (user count, customer impact)\n   - How many users can't work?\n   - Which customers affected?\n   \n3. Root cause (likely diagnosis)\n   - DB memory? Network? Application bug?\n   \n4. Recommended action\n   - Restart service? Scale resources? Contact vendor?\n```\n\nExample:\n```\nError: RFC_TIMEOUT\nLLM Analysis:\n  Severity: HIGH (function blocking all reports)\n  Impact: 200+ users unable to run monthly reports\n  Root cause: Database memory exhausted (typical pattern)\n  Recommended action: Increase DBMS memory OR optimize query\n  Relevant OSS Note: SAP Note 2345678 - RFC Timeout Solutions\n```\"\n\n### Phase 3: Knowledge Grounding (OSS Integration)\n\"Link errors to SAP OSS notes:\n\n```\nFor each error_code:\n1. Query SAP OSS database (via API if available)\n2. Return top 3 relevant notes\n3. Summarize: What's the problem? What's the fix?\n\nThis grounds LLM recommendations in SAP best practices\n(not just general knowledge).\n```\"\n\n### Phase 4: Correlation & Clustering\n\"Related errors often come in bursts—identify patterns:\n\n```python\n# Group similar errors\nerror_spikes = {\n  'RFC_TIMEOUT': 1000 in last hour (vs. 100 normal),\n  'DBMS_MEMORY': 500 in last hour,\n  'NETWORK_ERROR': 300 in last hour\n}\n\n# Alert: 'Multiple related errors spiked 10x in last hour.\n#         Likely cascading failure. Escalate to DevOps.'\n```\"\n\n### Phase 5: Operator Dashboard\n\"Build UI showing:\n\n1. **Critical Alerts** (sorted by impact)\n   - Error type, frequency, impact summary\n   \n2. **Trend Charts** (error rate over time)\n   - Spike detection with anomaly highlighting\n   \n3. **Detailed Analysis** (per error)\n   - Log sample + LLM analysis + OSS notes\n   \n4. **Recommended Actions**\n   - What to do, who to notify, escalation path\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: CAP + HANA (Not FastAPI + Postgres)\n\n**What you'd say:**\n\"I'd use **SAP CAP + HANA** because:\n\n✓ Logs can be huge (100GB+ per year)\n✓ HANA columnar storage: Fast aggregation queries\n✓ Full-text indexing: Instant error_code search\n✓ TypeScript: Type safety in critical system\n✓ XSUAA: Enterprise auth baked-in\n✓ Integration: Native SAP ecosystem\n\nFastAPI + Postgres could work but wouldn't scale as well for this volume.\"\n\n### Decision 2: Async LLM Analysis\n\n**What you'd say:**\n\"LLM analysis is slow (2-5s per log). We can't block:\n\n1. Log arrives → immediately store in HANA (fast)\n2. Async job (SAP Event Mesh) → analyze via LLM\n3. Update dashboard with results as they complete\n4. Operators see: 'Analysis in progress...' then results appear\"\n\n### Decision 3: HANA Optimization for Scale\n\n**What you'd say:**\n\"For billions of logs, I'd:\n\n- **Partitioning**: By date (daily or weekly)\n- **Indexes**: On error_code, severity, timestamp, source\n- **Compression**: Use columnar compression\n- **Archival**: Move logs >90 days to cold storage\n- **Statistics**: Regular HANA optimization tasks\"\n\n---\n\n## Implementation Walk-Through\n\n### Example Flow\n\n```\n1. Error stream arrives in Kafka/Event Mesh\n2. Consumer parses, normalizes to JSON\n3. Stores in HANA (takes 10ms)\n4. Publishes event: 'new_error_RFC_TIMEOUT'\n5. Async worker receives event\n6. Calls LLM: \"Analyze this RFC_TIMEOUT\"\n7. Calls SAP OSS API: \"Get notes for RFC_TIMEOUT\"\n8. Scores impact: \"Affects 200 users\"\n9. Updates HANA: error record + analysis\n10. Dashboard queries HANA, shows analysis\n\nTotal latency:\n- Store in HANA: 10ms\n- Analyze async: 3-5 seconds\n- Display on dashboard: Real-time\n```\n\n### Code Skeleton\n\n```python\n# Log ingestion\nfrom kafka import KafkaConsumer\nimport json\n\nconsumer = KafkaConsumer('log-topic')\nfor log_message in consumer:\n    log = json.loads(log_message.value)\n    normalized = normalize_log(log)\n    \n    # Store in HANA\n    hana_client.insert('errors', normalized)\n    \n    # Trigger async analysis\n    event_mesh.publish('error_analysis', {'error_id': normalized['id']})\n\n# Async analysis\nasync def analyze_error(error_id):\n    error = hana_client.query(f\"SELECT * FROM errors WHERE id = {error_id}\")\n    \n    # LLM analysis\n    analysis = llm.analyze(f'''\n        Error: {error['error_code']}\n        Message: {error['message']}\n        Analyze severity, impact, root cause, recommended action.\n    ''')\n    \n    # OSS lookup\n    oss_notes = sap_oss_api.search(error['error_code'])\n    \n    # Update HANA\n    hana_client.update('errors', error_id, {\n        'analysis': analysis,\n        'oss_notes': oss_notes,\n        'timestamp_analyzed': now()\n    })\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **LLM analysis expensive at scale** | Batch process, cost throttling, cache results for duplicate errors |\n| **Logs arrive faster than analysis** | Queue depth monitoring, implement backpressure |\n| **False correlations** | Use statistical correlation, require human confirmation |\n| **OSS lookup fails** | Graceful fallback: show generic remediation advice |\n| **HANA disk fills** | Partition by date, archive to cold storage after 90 days |\n\n---\n\n## Success Metrics\n\n**MTTR Improvement:**\n- Current: 8 hours → Target: 30 minutes (16x faster)\n\n**Accuracy:**\n- 95% of recommended actions correct\n- Operators follow LLM recommendations 80% of time\n\n**Scale:**\n- Handle 100k logs/day without degradation\n- Analysis latency <5 seconds\n\n**Cost:**\n- Reduce log analysis effort by 60% (FTE savings)\n\n---\n\n## Related Use Cases\n\n- **Video Incident Detection** (Similar: Event prioritization, different domain)\n- **Anomaly Detection** (Similar: Anomaly scoring, different domain)\n"}, {"num": "06", "short": "06 Video Incident Monitoring", "content": "# USE CASE 6: Video Incident & Safety Monitoring\n\n## Quick Summary\nAnalyze warehouse video streams for safety violations using vision LLM (Gemini 2.5 Pro). Detect hard hat violations, equipment misuse, restricted area breaches. Alert with high confidence thresholds to avoid false alarms.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"We have video feeds from our warehouse. Manually monitoring them is expensive and error-prone. Workers aren't wearing hard hats, equipment is misused. We need automated detection with high confidence—false alarms that cause unnecessary evacuations are problematic.\"\n\n**Business Impact:**\n- Safety incidents: 5-10 per month\n- Cost per incident: €10k (injury + investigation + downtime)\n- Current monitoring: Manual (expensive, inconsistent)\n\n---\n\n## Discovery Questions\n\n1. **\"What incidents are most important to catch?\"** (Hard hat? Fire? Machinery misuse?)\n2. **\"What's your false alarm tolerance?\"** (Evacuate 100 workers = can't have false positives)\n3. **\"Live streams or recorded videos?\"** (Affects real-time vs. batch architecture)\n4. **\"Acceptable latency?\"** (Real-time alert or 1-hour delayed analysis okay?)\n5. **\"Privacy concerns?\"** (Recording workers—policy in place?)\n\n---\n\n## Your Approach\n\n### Phase 1: Video Intake & Storage\n\"Accept video uploads or stream links. Store temporarily:\n\n```\nFor large files:\n- Implement chunked upload (avoid timeouts)\n- Validate format/size\n- Store in object storage (not local disk)\n\nProcessing options:\n- Real-time: Analyze video stream directly (low latency)\n- Batch: Process uploaded videos hourly (cheaper)\n```\"\n\n### Phase 2: Frame Extraction\n\"Video is too large to send in one piece. Extract key frames:\n\n```\nStrategy 1: Sample every N frames (1/30 = 1 second interval)\nStrategy 2: Motion detection (only process frames with movement)\nStrategy 3: Uniform distribution (spread frames across video duration)\n\nWhy?\n- Gemini 2.5 Pro can only handle videos of reasonable size\n- Reduces processing cost significantly\n- Captures most incidents\n```\"\n\n### Phase 3: Vision LLM Analysis\n\"Send frame to Gemini 2.5 Pro:\n\n```\nPrompt:\n\\\"Analyze this warehouse video frame for safety violations:\n- Hard hat compliance (workers near equipment with/without hard hat)\n- Equipment misuse (forklifts, pallet jacks following safety)\n- Restricted area breaches (unauthorized access)\n- Emergency situations (fire, injury, spills)\n- Environmental hazards (obstacles in aisles, poor lighting)\n\nFor each incident detected:\n- Type (hard hat violation, restricted area breach, etc.)\n- Location in frame (if possible)\n- Severity (CRITICAL, HIGH, MEDIUM, LOW)\n- Confidence (0-100%)\n- Recommended action\n\nReturn JSON:\n{\n  'incidents': [\n    {\n      'type': 'hard_hat_violation',\n      'severity': 'HIGH',\n      'confidence': 92,\n      'location': 'worker near pallet jack',\n      'action': 'Alert supervisor'\n    }\n  ],\n  'overall_risk': 'HIGH'\n}\n\\\"\n```\"\n\n### Phase 4: Incident Processing\n\"Filter by confidence threshold:\n\n```\n<70% confidence: Ignore (probably false positive)\n70-90% confidence: Flag for human review\n>90% confidence: Immediate alert\n\nExample:\n- Hard hat at 92% → Alert supervisor immediately\n- Movement that might be worker at 60% → Don't alert (shadow/reflection)\n```\"\n\n### Phase 5: Alert Generation\n\"Build notification system:\n\n```\nCritical alerts (>90% confidence):\n- SMS to supervisor: 'HARD HAT VIOLATION at Packing Area - Frame #123'\n- Alert dashboard: Show video frame + incident\n- Log incident: Timestamp, location, severity, image\n\nMedium alerts (70-90%):\n- Add to review queue for human verification\n- Don't escalate yet\n\nEscalation:\n- 3+ incidents in 1 hour → Escalate to Manager\n- Repeated violators → Generate report\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Batch vs. Real-Time\n\n**What you'd say:**\n\"I'd start with **batch processing**:\n\n- Process videos every 4 hours\n- Analyze frames in parallel\n- Store incidents in database\n- Alert if severity warrants immediate attention\n\nWhy batch?\n- Lower cost (can batch process at off-peak)\n- Better accuracy (can apply post-processing)\n- Simpler to implement\n\nFuture: Real-time if needed (more complex, more expensive)\"\n\n### Decision 2: Confidence Thresholds\n\n**What you'd say:**\n\"High false positive rate is worse than missing incidents:\n\n```\nHard hat violation threshold: >85% (very high)\n  Why? False alarm evacuates warehouse\n  \nRestricted area breach: >80% (high)\n  Why? Fewer false positives than hard hat\n\nGeneral safety: >70% (medium)\n  Why? More tolerance for false positives\n```\n\nI'd A/B test thresholds and adjust based on feedback.\"\n\n### Decision 3: Multi-Camera Coordination\n\n**What you'd say:**\n\"For multiple cameras:\n\n- Process independently\n- Correlate incidents: 'If incident detected in 2+ cameras simultaneously → higher severity'\n- Track worker movement across zones\n- Identify repeat violators\n\nExample: 'Worker without hard hat moved from Zone A to Zone B in 30 seconds'\n→ Alert about the same worker (not duplicate alerts)\"\n\n---\n\n## Implementation Walk-Through\n\n### Code Skeleton\n\n```python\nimport anthropic\nimport base64\nfrom pathlib import Path\n\n# Extract frames from video\nimport cv2\ndef extract_frames(video_path, sample_rate=30):\n    cap = cv2.VideoCapture(video_path)\n    frames = []\n    frame_count = 0\n    \n    while cap.isOpened():\n        ret, frame = cap.read()\n        if not ret:\n            break\n        \n        if frame_count % sample_rate == 0:\n            # Save frame temporarily\n            frame_path = f'/tmp/frame_{frame_count}.jpg'\n            cv2.imwrite(frame_path, frame)\n            frames.append(frame_path)\n        \n        frame_count += 1\n    \n    cap.release()\n    return frames\n\n# Analyze frame with Gemini\ndef analyze_frame(frame_path):\n    client = anthropic.Anthropic()\n    \n    with open(frame_path, 'rb') as f:\n        image_data = base64.b64encode(f.read()).decode('utf-8')\n    \n    message = client.messages.create(\n        model=\"claude-3-5-sonnet-20241022\",  # or gemini-2.5-pro via SAP AI Core\n        max_tokens=500,\n        messages=[\n            {\n                \"role\": \"user\",\n                \"content\": [\n                    {\n                        \"type\": \"image\",\n                        \"source\": {\n                            \"type\": \"base64\",\n                            \"media_type\": \"image/jpeg\",\n                            \"data\": image_data,\n                        },\n                    },\n                    {\n                        \"type\": \"text\",\n                        \"text\": \"Analyze this warehouse frame for safety violations...\"\n                    }\n                ],\n            }\n        ],\n    )\n    \n    return json.loads(message.content[0].text)\n\n# Process video\nframes = extract_frames('warehouse.mp4')\nincidents = []\n\nfor frame in frames:\n    analysis = analyze_frame(frame)\n    \n    # Filter by confidence\n    for incident in analysis['incidents']:\n        if incident['confidence'] > 70:  # Only flagged incidents\n            incidents.append(incident)\n            \n            if incident['confidence'] > 90:\n                # Send immediate alert\n                send_alert(incident)\n\n# Store for review\nstore_incidents(incidents)\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **False alarms cause disruption** | High confidence threshold (>85%), human review for medium confidence |\n| **Privacy concerns** | Frame retention policy (delete after 24 hours), anonymize faces if possible |\n| **Vision model misses incidents** | Combination with motion detection, zone-based alerts |\n| **Video processing too slow** | Batch processing, parallel frame analysis, adaptive sampling |\n| **Worker pushback on monitoring** | Transparent policy, explain safety purpose, focus on incident not identity |\n\n---\n\n## Success Metrics\n\n**Safety:**\n- Incidents detected: 95% of safety violations caught before escalation\n- False alarm rate: <5% (trust in system maintained)\n- Response time: <5 minutes from detection to alert\n\n**Operational:**\n- Supervisor productivity: 50% of monitoring time freed up\n- Incident tracking: 100% complete audit trail\n\n**Financial:**\n- Reduced incidents by 40% (lower injury costs)\n- Monitoring cost reduction: 60%\n\n---\n\n## Related Use Cases\n\n- **Anomaly Detection** (Similar: Anomaly scoring, different domain)\n"}, {"num": "07", "short": "07 Intelligent Procurement", "content": "# USE CASE 7: Intelligent Procurement Assistant\n\n## Quick Summary\nAutomated commodity code extraction and validation from procurement contracts using pattern matching + LLM. Validates extracted codes against UNSPSC/CPV standards. Streamlit interface for manual correction.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Our procurement team manually processes contracts to extract commodity codes. It's time-consuming and inconsistent. We need to automatically extract UNSPSC codes, validate them, and flag ambiguous cases for review.\"\n\n**Business Impact:**\n- Current processing: 1 hour per contract\n- Contracts per month: 200\n- Opportunity: Save 150 hours/month = 1 FTE\n\n---\n\n## Discovery Questions\n\n1. **\"What formats are contracts in?\"** (PDF, DOCX, images?)\n2. **\"How complex are the codes?\"** (UNSPSC 8-digit? Industry-specific?)\n3. **\"Accuracy requirements?\"** (95%? 99%?)\n4. **\"What happens after extraction?\"** (Imported to SAP? Used for reporting?)\n5. **\"Do you have a commodity codebook?\"** (Yes → can validate; No → harder to validate)\n\n---\n\n## Your Approach\n\n### Phase 1: Text Extraction\n\"Extract text from contracts:\n\n```python\n# PDF extraction\nimport PyPDF2\npdf_reader = PyPDF2.PdfReader('contract.pdf')\ntext = ''\nfor page in pdf_reader.pages:\n    text += page.extract_text()\n\n# DOCX extraction\nfrom docx import Document\ndoc = Document('contract.docx')\ntext = '\\\\n'.join([para.text for para in doc.paragraphs])\n\n# Result: Full contract text\n```\"\n\n### Phase 2: Pattern-Based Matching (MVP)\n\"80% of cases can be solved with pattern matching:\n\n```\nUNSPSC codes: Look for 8-digit sequences in specific contexts\nCPV codes: Look for 8-digit sequences with dashes\n\nPattern:\n- Commodity Code: <8 digits>\n- UNSPSC: <8 digits>\n- Code: <8 digits>\n\nRegular expression:\n```python\nimport re\nCOMMODITY_PATTERN = r'(?:commodity code|code|UNSPSC)[\\\\s:]*([0-9]{8})'\nmatches = re.findall(COMMODITY_PATTERN, text, re.IGNORECASE)\n```\n\nWhy patterns first?\n- Fast (microseconds)\n- Accurate (95%+ for standard formats)\n- No ML training needed\n- Easy to maintain\"\n\n### Phase 3: Contextual Validation\n\"Validate extracted codes:\n\n```\nIs code in known UNSPSC database? (Yes → Valid)\nDoes context match expected commodity? (Yes → High confidence)\nIs code plausible? (Check digit validation if applicable)\n\nExample:\n- Extracted: 12345678\n- Check: Is this a plausible UNSPSC? (No → Flag as uncertain)\n- Check: Does context mention 'software'? Code matches SW category? (Yes → Validated)\n```\"\n\n### Phase 4: LLM for Ambiguous Cases\n\"20% of cases need LLM reasoning:\n\n```python\n# If pattern matching < 80% confidence\nif confidence < 0.8:\n    llm_result = llm.extract(f'''\n        Extract commodity codes from this contract snippet:\n        {contract_context}\n        \n        Return JSON with:\n        - codes: [list of extracted codes]\n        - description: what goods/services\n        - confidence: 0-1\n    ''')\n```\n\nWhy LLM only for edge cases?\n- Reduces LLM cost\n- Maintains speed (most cases fast)\n- LLM errors won't cascade\"\n\n### Phase 5: Streamlit UI\n\"Interactive review interface:\n\n```python\nimport streamlit as st\n\nuploaded_file = st.file_uploader('Upload Contract', type=['pdf', 'docx'])\nif uploaded_file:\n    extracted_data = extract_contract_data(uploaded_file)\n    \n    st.write('Extracted Commodity Codes:')\n    for code in extracted_data['commodity_codes']:\n        # Editable text input\n        new_code = st.text_input(\n            f'Code {code[\\\"code\\\"]}',\n            value=code['code'],\n            key=f'code_{code[\\\"id\\\"]}'\n        )\n        \n        # Confidence badge\n        st.write(f'Confidence: {code[\\\"confidence\\\"]:.0%}')\n        \n        # Description\n        st.write(f'Description: {code[\\\"description\\\"]}')\n    \n    if st.button('Export'):\n        export_to_csv(extracted_data)\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Pattern-First Approach\n\n**What you'd say:**\n\"I'd start with patterns because:\n\n1. **Speed**: 0.01s vs. 2s for LLM\n2. **Accuracy**: 95%+ for standard formats\n3. **Cost**: Essentially free (no LLM calls)\n4. **Maintainability**: Easy to update patterns\n\nOnly use LLM for the 20% of edge cases where patterns fail.\"\n\n### Decision 2: Fuzzy Matching for Validation\n\n**What you'd say:**\n\"For ambiguous codes, use fuzzy matching:\n\n```python\nfrom fuzzywuzzy import fuzz\n\nextracted = 'Commodity Code 12345678'\nstandard = '12345678'  # From known database\n\nscore = fuzz.token_set_ratio(extracted, standard)\n# If score > 85% → Accept\n# If 60-85% → Flag for review\n# If <60% → Reject\n```\"\n\n### Decision 3: Progressive Validation\n\n**What you'd say:**\n\"I'd validate progressively:\n\n1. **Pattern match** → Code found?\n2. **Database lookup** → Code in UNSPSC?\n3. **Context match** → Does description match commodity type?\n4. **Confidence score** → Combine all signals\n\nExample:\n- Pattern found: +50%\n- Code in database: +30%\n- Context matches: +20%\n- Final: 90%+ confidence → Flag = green\"\n\n---\n\n## Implementation Walk-Through\n\n### Code Skeleton\n\n```python\nfrom fuzzywuzzy import fuzz\nimport re\n\ndef extract_commodity_codes(contract_text):\n    # Step 1: Pattern matching\n    pattern = r'(?:commodity|code|UNSPSC)[\\\\s:]*([0-9]{8})'\n    pattern_matches = re.findall(pattern, contract_text, re.IGNORECASE)\n    \n    results = []\n    for code in pattern_matches:\n        # Step 2: Database lookup\n        is_valid = code_database.contains(code)\n        \n        # Step 3: Context validation\n        context = extract_context_around_code(contract_text, code)\n        context_score = validate_context(code, context)\n        \n        # Step 4: Confidence score\n        confidence = 0.5 if is_valid else 0.3\n        confidence += context_score * 0.5\n        \n        results.append({\n            'code': code,\n            'confidence': confidence,\n            'context': context,\n            'status': 'validated' if confidence > 0.8 else 'needs_review'\n        })\n    \n    # Step 5: LLM for low-confidence cases\n    for result in results:\n        if result['confidence'] < 0.7:\n            llm_analysis = llm.refine(result['context'])\n            result['llm_confidence'] = llm_analysis['confidence']\n            result['status'] = 'llm_reviewed'\n    \n    return results\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **Pattern misses valid codes** | Combine multiple patterns, manual search option |\n| **LLM extracts wrong code** | Validate against database, flag for review |\n| **Context validation too strict** | Allow user override with audit trail |\n| **Performance on large contracts** | Stream processing, pagination |\n\n---\n\n## Success Metrics\n\n**Accuracy:**\n- 95%+ accuracy on standard formats\n- <5% false positive rate\n\n**Speed:**\n- Average extraction: 1 minute (vs. 10 minutes manual)\n- 95% of contracts require no manual correction\n\n**Adoption:**\n- 80% of contracts automated\n\n**Cost:**\n- Save 150 hours/month = €5k+/month\n\n---\n\n## Related Use Cases\n\n- **Purchase Order Extractor** (Similar: Document extraction)\n- **AI PDF Information Extraction** (Similar: Vision-based extraction)\n"}, {"num": "08", "short": "08 Purchase Order Extractor", "content": "# USE CASE 8: Purchase Order Extractor\n\n## Quick Summary\nAutomated PO extraction from supplier documents using Document AI + LLM fallback. Extracts: PO number, vendor, items, quantities, prices, delivery date. Validates structure and escalates errors.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Purchase orders arrive in different formats—some scanned, some PDF, some handwritten. Manual data entry is error-prone and slow. We need to extract key data automatically and integrate with SAP.\"\n\n**Business Impact:**\n- Current processing: 15 min per PO\n- Error rate: 5% (rework: €50 per correction)\n- POs per month: 1000\n- Opportunity: Save 250 hours/month = €40k+ (accounting for rework)\n\n---\n\n## Discovery Questions\n\n1. **\"What formats do POs arrive in?\"** (PDF, scanned, EDI, email attachment?)\n2. **\"Any vendor consistency?\"** (Same vendors repeatedly? Same format per vendor?)\n3. **\"Accuracy requirements?\"** (95%? 99%? How critical are errors?)\n4. **\"Where does extracted data go?\"** (SAP BTP procurement? ERP? Database?)\n5. **\"Special handling needed?\"** (Multi-currency? Different units? Complex line items?)\n\n---\n\n## Your Approach\n\n### Phase 1: Document Intake & Preprocessing\n\"Handle various input formats:\n\n```\nPDF: Extract text/images\nScanned image: Apply OCR preprocessing (contrast, deskew)\nEmail: Parse attachment, extract from body if present\nEDI: Parse structured format directly\n\nPreprocessing:\n- Contrast enhancement (scanned documents)\n- Deskew (rotated images)\n- Resolution check (too low → request original)\n```\"\n\n### Phase 2: Structured Data Extraction\n\"Use Document AI for layout-aware extraction:\n\n```\nSAP Document AI (Premium Edition):\n- Pre-trained on financial documents\n- High accuracy on standard PO templates\n- Returns confidence scores per field\n- Handles multi-page documents\n\nExtracted fields:\n- PO header: Number, date, vendor name, vendor code\n- Billing/delivery addresses\n- Line items: Product code, description, quantity, unit price, total\n- Terms: Payment terms, delivery date, special instructions\n```\"\n\n### Phase 3: Validation & Enrichment\n\"Validate extracted data:\n\n```\nHeader validation:\n- PO number format (expected pattern)\n- Date is reasonable (not future date)\n- Vendor exists in master data\n\nLine item validation:\n- Quantities positive\n- Prices reasonable (within expected range)\n- Total = Sum of line totals\n\nEnrichment:\n- Lookup vendor code by name (if missing)\n- Lookup product code by description\n- Calculate tax if missing\n```\"\n\n### Phase 4: LLM Fallback\n\"For complex/ambiguous cases:\n\n```python\nif extraction_confidence < 0.8:\n    # Use LLM as fallback\n    llm_result = llm.extract_po(f'''\n        Extract PO from this document:\n        {document_text_or_image}\n        \n        Return JSON:\n        {{\n          'po_number': '',\n          'vendor_name': '',\n          'line_items': [{{\n            'product_code': '',\n            'quantity': 0,\n            'unit_price': 0\n          }}],\n          'delivery_date': '',\n          'total_amount': 0\n        }}\n    ''')\n```\n\nWhy Document AI + LLM combo?\n- Document AI: Fast, accurate on standard formats\n- LLM: Flexible for unusual formats\n- Together: Covers 99% of cases\"\n\n### Phase 5: Integration & Error Handling\n\"Push to SAP:\n\n```\nHigh confidence (>95%):\n- Auto-create PO in SAP\n- Send confirmation to vendor\n- Mark in system as processed\n\nMedium confidence (80-95%):\n- Create draft PO\n- Flag for analyst review\n- Route to review queue\n\nLow confidence (<80%):\n- Request human input\n- Show extraction with editable fields\n- Analyst confirms before creating PO\n\nErrors:\n- Vendor not in master data → Create vendor record\n- Product not found → Create placeholder\n- Currency missing → Ask user\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: Document AI vs. Open Source\n\n**What you'd say:**\n\"I'd choose SAP Document AI (Premium) because:\n\n✓ Pre-trained specifically on financial documents\n✓ 95%+ accuracy on standard formats\n✓ Returns confidence scores\n✓ SAP integration built-in\n\nOpen source alternatives (LayoutLM, Donut):\n- Would work but require fine-tuning\n- Less mature SAP integration\n- Trade-off: More control vs. more work\"\n\n### Decision 2: Queue-Based Processing\n\n**What you'd say:**\n\"For high volume (1000+ POs/month):\n\n1. Document arrives → Store in S3\n2. Trigger extraction job (async queue)\n3. Extract data (takes 5-10 seconds)\n4. Validate & enrich (takes 2-3 seconds)\n5. Create SAP PO or route to review\n6. Send confirmation email\n\nWhy queue?\n- Non-blocking: User doesn't wait\n- Scalable: Process in parallel\n- Recoverable: Failed jobs can retry\"\n\n### Decision 3: Error Escalation\n\n**What you'd say:**\n\"Multi-tier escalation:\n\n```\nLow confidence → Manual review queue\nVendor not found → Create new vendor (with approval)\nProduct not found → Use LLM to suggest existing product\nCurrency mismatch → Flag + ask user\nDate format ambiguous → Show options to user\n```\"\n\n---\n\n## Implementation Walk-Through\n\n### Code Skeleton\n\n```python\nfrom google.cloud import documentai_v1\nimport json\n\ndef extract_purchase_order(document_path):\n    # Initialize Document AI\n    client = documentai_v1.DocumentProcessorServiceClient()\n    processor_name = client.processor_path(\n        PROJECT_ID, LOCATION, PROCESSOR_ID\n    )\n    \n    # Read document\n    with open(document_path, 'rb') as f:\n        image = f.read()\n    \n    # Process with Document AI\n    document = documentai_v1.Document(raw_document={'content': image})\n    request = documentai_v1.ProcessRequest(\n        name=processor_name,\n        raw_document=document.raw_document\n    )\n    response = client.process_document(request=request)\n    document = response.document\n    \n    # Extract structured data\n    extracted = {\n        'po_number': document.text[0:20],  # Simplified\n        'vendor_name': '',\n        'line_items': [],\n        'total_amount': 0\n    }\n    \n    # Parse document entities\n    for entity in document.entities:\n        if entity.type_ == 'po_number':\n            extracted['po_number'] = entity.normalized_value.text\n        elif entity.type_ == 'vendor':\n            extracted['vendor_name'] = entity.normalized_value.text\n        elif entity.type_ == 'line_item':\n            extracted['line_items'].append({\n                'product': entity.properties[0].normalized_value.text,\n                'quantity': float(entity.properties[1].normalized_value.text),\n                'price': float(entity.properties[2].normalized_value.text)\n            })\n    \n    # Validate\n    validation_result = validate_po(extracted)\n    \n    # Enrich (lookup vendor, product codes)\n    enriched = enrich_with_master_data(extracted)\n    \n    # Integrate with SAP\n    if validation_result['confidence'] > 0.95:\n        create_sap_po(enriched)\n    else:\n        queue_for_review(enriched, validation_result)\n    \n    return enriched\n```\n\n---\n\n## Risk Mitigation\n\n| Risk | Mitigation |\n|------|-----------|\n| **Extraction fails on unusual format** | Fallback to LLM, manual review queue |\n| **Vendor/product not in master data** | Auto-create with approval workflow |\n| **Duplicate PO creation** | Check for existing PO before creating |\n| **Currency/unit mismatch** | Validate against company supported currencies |\n| **Price outliers** | Flag if >20% deviation from average supplier price |\n\n---\n\n## Success Metrics\n\n**Speed:**\n- Automated extraction: 80% of POs\n- Latency: <1 minute end-to-end\n\n**Accuracy:**\n- 95%+ accurate extraction\n- <1% incorrect PO creation rate\n\n**Cost:**\n- Save 200+ hours/month (€12k+/month)\n- Rework reduction: 80%\n\n**User Adoption:**\n- 90% confidence in automated POs\n- <5% manual override rate\n\n---\n\n## Related Use Cases\n\n- **Sales Order Extractor** (Similar: Document extraction, different document type)\n- **Customer Credit Check** (Similar: Document validation and enrichment)\n"}, {"num": "09", "short": "09 AI Capability Matcher", "content": "# USE CASE 9: AI Capability Matcher\n\n## Quick Summary\nSemantic matching of products to customer requirements using embeddings + vector search. Extract customer needs → Generate embedding → Search HANA vector table → Rank by relevance → Recommend products.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n\"Our sales team spends hours matching customer requirements to products. We have 10k+ products across different categories. Customers describe needs in natural language, and our team has to manually search through catalogs. We need intelligent matching.\"\n\n**Business Impact:**\n- Current matching time: 1 hour per customer\n- Success rate: 60% (sometimes miss better products)\n- Opportunity: Speed up + improve recommendation quality\n\n---\n\n## Discovery Questions\n\n1. **\"How are products currently structured?\"** (Database? Categories? Attributes?)\n2. **\"What product metadata exists?\"** (Specs, use cases, customer reviews?)\n3. **\"How many products?\"** (1000? 10k? 100k?)\n4. **\"What's the matching process?\"** (Text-based search? Category browsing?)\n5. **\"Should recommendations be exact matches or similar alternatives?\"**\n\n---\n\n## Your Approach\n\n### Phase 1: Product & Metadata Preparation\n\"Load all products with rich metadata:\n\n```\nProduct:\n- ID, name, category, description\n- Specifications (technical details)\n- Use cases (what it's used for)\n- Customer reviews (what users say about it)\n- Industry vertical (automotive, finance, etc.)\n\nCombine into searchable text:\nproduct_text = f'''\n{name}\n{description}\n{', '.join(use_cases)}\nIndustry: {', '.join(verticals)}\nSpecs: {', '.join(specs)}\n'''\n```\"\n\n### Phase 2: Embedding Generation\n\"Convert product text to embeddings:\n\n```python\nfrom sentence_transformers import SentenceTransformer\n\nmodel = SentenceTransformer('all-MiniLM-L6-v2')  # Free, fast, good quality\n\n# Generate embeddings for all products\nfor product in products:\n    embedding = model.encode(product['text'])  # 384-dim vector\n    save_to_hana_vector_table(product['id'], embedding)\n    \n# Result: HANA table with columns: product_id, embedding, metadata\n```\n\nWhy sentence-transformers?\n- Free (no API costs)\n- Fast (can run locally)\n- Good quality (trained on sentence pairs)\n- Offline (no external dependencies)\"\n\n### Phase 3: Customer Need Extraction\n\"Extract customer requirements:\n\n```\nCustomer: 'We need a solution for real-time order processing'\n\nExtract needs:\n- Use case: 'real-time order processing'\n- Industry: (inferred from context)\n- Priority: (real-time = speed critical)\n- Scale: (how many orders?)\n```\"\n\n### Phase 4: Vector Search\n\"Search HANA vector table for similar products:\n\n```sql\n-- Cosine similarity search in HANA\nSELECT \n    product_id,\n    product_name,\n    COSINE_SIMILARITY(customer_embedding, product_embedding) AS similarity\nFROM hana_vector_products\nWHERE COSINE_SIMILARITY(customer_embedding, product_embedding) > 0.5\nORDER BY similarity DESC\nLIMIT 5\n```\n\nWhy HANA?\n- Native vector search (O(1) lookup with indexing)\n- Scales to 1M+ products\n- Integration with product metadata\n- Can combine with SQL filters\"\n\n### Phase 5: Re-ranking & Recommendation\n\"Combine multiple signals:\n\n```\nPure similarity: 50% weight\nCompany fit: 20% weight (industry match)\nReview score: 20% weight (customer satisfaction)\nAvailable inventory: 10% weight\n\nFinal score = 0.5 * similarity + 0.2 * industry_fit + 0.2 * reviews + 0.1 * availability\n\nResult: Top 5 ranked recommendations\n```\"\n\n---\n\n## Key Architectural Decisions\n\n### Decision 1: sentence-transformers vs. OpenAI Embeddings\n\n**What you'd say:**\n\"I'd use **sentence-transformers** because:\n\n✓ Free (no API costs)\n✓ Offline (no latency, no privacy concerns)\n✓ Fast (milliseconds per embedding)\n✓ Good quality (trained specifically for sentence similarity)\n\nOpenAI embeddings:\n- Better quality (+5-10%)\n- Cost: €0.02 per 1M tokens\n- For 10k products: negligible cost\n- But sentence-transformers is sufficient for most use cases\"\n\n### Decision 2: HANA Vector Search\n\n**What you'd say:**\n\"I'd use **HANA Vector Tables** because:\n\n✓ Native integration with SAP\n✓ Fast indexing (can handle 1M+ vectors)\n✓ Can combine with SQL filters (e.g., 'only in stock')\n✓ Scalable to enterprise scale\n\nAlternatives:\n- Weaviate: Open source, good but external system\n- Pinecone: Cloud, easy but expensive and external\n- HANA: Already have it, integrated\"\n\n### Decision 3: Re-ranking Strategy\n\n**What you'd say:**\n\"Multi-stage search:\n\n1. **Vector search**: Return top 100 by similarity (fast, coarse-grained)\n2. **Filter**: Remove out-of-stock, incompatible specs\n3. **Re-rank**: Combine 5 signals (similarity + fit + reviews + price + availability)\n4. **Diversify**: Avoid similar products (show different solutions)\n5. **Explain**: Show why each product recommended\"\n\n---\n\n## Implementation Walk-Through\n\n### Code Skeleton\n\n```python\nfrom sentence_transformers import SentenceTransformer\nimport numpy as np\n\n# Step 1: Generate product embeddings (batch)\nmodel = SentenceTransformer('all-MiniLM-L6-v2')\n\nfor product in get_all_products():\n    product_text = f\"{product['name']} {product['description']}\"\n    embedding = model.encode(product_text)\n    \n    # Save to HANA vector table\n    hana.insert('product_vectors', {\n        'product_id': product['id'],\n        'embedding': embedding.tobytes(),  # Store as binary\n        'name': product['name'],\n        'category': product['category']\n    })\n\n# Step 2: Extract customer need\ncustomer_request = \"We need real-time order processing for e-commerce\"\ncustomer_embedding = model.encode(customer_request)\n\n# Step 3: Vector search in HANA\nquery = f\"\"\"\nSELECT \n    product_id, name, category,\n    COSINE_SIMILARITY('{customer_embedding}', embedding) AS similarity\nFROM product_vectors\nWHERE COSINE_SIMILARITY('{customer_embedding}', embedding) > 0.5\nORDER BY similarity DESC\nLIMIT 10\n\"\"\"\n\ncandidates = hana.execute(query)\n\n# Step 4: Re-ranking\nrecommendations = []\nfor product in candidates:
