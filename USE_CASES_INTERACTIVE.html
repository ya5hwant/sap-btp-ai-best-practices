    <style>
        :root {
            --sap-blue: #0064d9;
        }

        body {

        header {
            background: linear-gradient(135deg, var(--sap-blue) 0%, #0052a3 100%);

            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 12px rgba(0, 100, 217, 0.15);
        }

        .nav-tabs {
            border-bottom: 3px solid var(--sap-blue);
            background: white;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
            gap: 0;
            margin-bottom: 0;
        }

        .nav-link {
            color: #666;
            border: none;
            border-bottom: 3px solid transparent;
            font-weight: 500;
            padding: 0.75rem 0.6rem;
            font-size: 0.8rem;
            transition: all 0.3s ease;

        }

        .nav-link:hover {
            color: var(--sap-blue);
            background-color: rgba(0, 100, 217, 0.05);
        }

        .nav-link.active {
            color: white;

            border-bottom-color: var(--sap-blue);
        }

        .tab-content {
            background: white;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        .markdown-content {
            line-height: 1.8;
            color: #333;
        }

        .markdown-content h1 {
            color: var(--sap-blue);
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #f0f0f0;
            padding-bottom: 1rem;
        }

        .markdown-content h2 {
            color: var(--sap-blue);
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .markdown-content h3 {
            color: var(--sap-blue);
            font-size: 1.2rem;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
        }

        .markdown-content p {
            margin-bottom: 1rem;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 1rem;
            margin-left: 2rem;
        }

        .markdown-content li {
            margin-bottom: 0.5rem;
        }

        .markdown-content code {
            background: #f5f5f5;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #d32f2f;
        }

        .markdown-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .markdown-content pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .markdown-content table th {
            background: var(--sap-blue);
            color: white;
            padding: 0.8rem;
            text-align: left;
            font-weight: 600;
        }

        .markdown-content table td {
            padding: 0.8rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .markdown-content table tr:hover {
            background: #f0f0f0;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--sap-blue);
            padding-left: 1rem;
            margin-left: 0;
            color: #666;
            font-style: italic;
        }

        .container-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }

        .search-box {
            margin-bottom: 1.5rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--sap-blue);
            box-shadow: 0 0 0 3px rgba(0, 100, 217, 0.1);
        }

        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: var(--sap-blue);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(0, 100, 217, 0.4);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .back-to-top:hover {
            background: #0052a3;
            transform: translateY(-5px);
        }

        .back-to-top.show {
            display: flex;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid #e0e0e0;
            color: #666;
        }
    </style>
</head>

<body>
    <header>
        <h1><i class="fas fa-brain"></i> SAP BTP AI Use Cases</h1>
        <p>23 Complete Real-World AI/ML Implementation Patterns - Full Interview Preparation</p>
    </header>

    <div class="container-main">
        <div class="search-box">
            <input type="text" id="usecase-search" placeholder="🔍 Search use cases...">
        </div>

        <ul class="nav nav-tabs" id="usecase-tabs" role="tablist"></ul>
        <div class="tab-content" id="usecase-content"></div>
    </div>

    <button class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></button>
    <footer class="footer">
        <p>© 2024 SAP BTP AI Best Practices | Complete Interview Preparation Guide</p>
        <p style="font-size: 0.9rem; margin-top: 0.5rem;">23 Use Cases • Full Markdown Content • Interview Tips &
            Success Metrics</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/highlight.min.js"></script>
    <script>
        // All 23 use cases with their full markdown content embedded
        const useCases = [
            {
                num: '01',
                short: '01 Post-Sales Chatbot',
                content: `# USE CASE 1: Post-Sales Chatbot (Automotive Services)\n\n## Quick Summary\nConversational AI bot for automotive dealership customers—handles warranty status, service history, appointment scheduling. Uses LLM with tool orchestration (LangGraph) to maintain context and call multi-step APIs.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n"Our customers call support for simple questions—'When was my last service?', 'What's my warranty status?', 'Can I schedule an appointment?'. These are repetitive, consume support staff, and frustrate customers. We want conversational AI to handle these self-service."\n\n**Business Impact:**\n- 30-40% of support calls are routine/repetitive\n- Each call costs €5-10 in labor\n- Customer satisfaction drops due to wait times\n- Opportunity: Save €100k+/year with automation\n\n---\n\n## Discovery Questions (Show Strategic Thinking)\n\nAsk these **before** jumping to architecture:\n\n1. **"How many customer inquiries per day are we talking about?"** \n   - (Scope: 100s? 1000s? Affects infrastructure scale)\n2. **"What are the top 5-10 customer questions we want the bot to handle?"**\n   - (Not all questions—focus high-volume, low-complexity)\n3. **"Do you have customer data in a central system or scattered across multiple systems?"**\n   - (Affects data layer: HANA, API, CRM?)\n4. **"What's your acceptable response time—real-time or is 2-3 seconds okay?"**\n   - (Affects streaming, async design)\n5. **"If the bot can't answer, what should happen?"**\n   - (Escalation: Connect to agent? Email support? FAQ link?)\n\n**Why ask these first?**\n- Shows you understand scope before designing\n- Identifies constraints (compliance, data availability)\n- Helps estimate ROI and timeline`
            },
            {
                num: '02',
                short: '02 Anomaly Detection',
                content: `# USE CASE 2: Anomaly Detection in Sales Orders\n\n## Quick Summary\nDetect unusual sales orders (fraud, data entry errors, unusual discounts) using unsupervised ML. Isolation Forest scores orders in real-time. SHAP explains why each order is flagged. LLM translates explanations into business language.\n\n---\n\n## Customer Pain Point\n\n**What you'd hear:**\n"We're seeing unusual orders slip through—sometimes fraudulent, sometimes data entry errors. Last month we lost €50k on a huge discount given to a new customer. We need to flag high-risk orders automatically without creating so many false positives that our team ignores the system."\n\n**Business Impact:**\n- Current loss rate: €500k/year in anomalies\n- Current false positive: 40% (team ignores alerts)\n- Target: Catch 80% of anomalies with <5% false positives`
            },
            {
                num: '03',
                short: '03 Credit Check',
                content: `# USE CASE 3: Customer Credit Check\n\n## Quick Summary\nAutomated credit decision pipeline: Extract credit documents (KYC, CSF, payment history) → Validate consistency → Apply policy rules → Generate audit report. Emphasis on compliance, explainability, traceability.`
            },
            {
                num: '04',
                short: '04 Diagram BPMN',
                content: `# USE CASE 4: Diagram-to-BPMN Converter\n\n## Quick Summary\nConvert hand-drawn or Visio business process diagrams to BPMN XML format. Uses vision LLM (Claude, GPT-4o) to understand diagram structure. Returns standard BPMN for import into SAP Build/Signavio.`
            },
            {
                num: '05',
                short: '05 Log Analyzer',
                content: `# USE CASE 5: AI Log Analyzer\n\n## Quick Summary\nIntelligent system log analysis: Ingest logs from multiple sources → Cluster similar errors → Prioritize by impact → Generate remediation recommendations → Link to SAP OSS notes.`
            },
            { num: '06', short: '06 Video Safety', content: `# USE CASE 6: Video Incident Monitoring\n\n## Quick Summary\nAnalyze warehouse video streams for safety violations using vision LLM.` },
            { num: '07', short: '07 Procurement', content: `# USE CASE 7: Intelligent Procurement\n\n## Quick Summary\nAutomated commodity code extraction from contracts.` },
            { num: '08', short: '08 PO Extractor', content: `# USE CASE 8: Purchase Order Extractor\n\n## Quick Summary\nExtract structured data from purchase orders.` },
            { num: '09', short: '09 Matcher', content: `# USE CASE 9: AI Capability Matcher\n\n## Quick Summary\nSemantic matching of products to customer requirements.` },
            { num: '10', short: '10 Email Agent', content: `# USE CASE 10: Email Agent\n\n## Quick Summary\nIntelligent email triage and routing system.` },
            { num: '11', short: '11 Outlier', content: `# USE CASE 11: Document Outlier Detection\n\n## Quick Summary\nDetect unusual or fraudulent documents in bulk processing.` },
            { num: '12', short: '12 Negotiation', content: `# USE CASE 12: Intelligent Negotiation\n\n## Quick Summary\nAI-assisted procurement negotiation and benchmarking.` },
            { num: '13', short: '13 Search', content: `# USE CASE 13: Product Catalog Search\n\n## Quick Summary\nAdvanced semantic search across product catalog.` },
            { num: '14', short: '14 PDF Extract', content: `# USE CASE 14: AI PDF Extraction\n\n## Quick Summary\nComprehensive document processing using GPT-4 Vision.` },
            { num: '15', short: '15 Sales Order', content: `# USE CASE 15: Sales Order Extractor\n\n## Quick Summary\nExtract structured data from sales orders.` },
            { num: '16', short: '16 RFQx', content: `# USE CASE 16: RFQx Analysis\n\n## Quick Summary\nAdvanced RFQ document analysis system.` },
            { num: '17', short: '17 Cockpit', content: `# USE CASE 17: Email Cockpit\n\n## Quick Summary\nEmail analysis and cockpit system using Streamlit.` },
            { num: '18', short: '18 Vendor', content: `# USE CASE 18: Vendor Selection\n\n## Quick Summary\nMulti-criteria vendor selection using optimization.` },
            { num: '19', short: '19 Touchless', content: `# USE CASE 19: Touchless Transactions\n\n## Quick Summary\nAutomated 3-way-match processing using rules.` },
            { num: '20', short: '20 Utilities', content: `# USE CASE 20: Utilities Rate Compare\n\n## Quick Summary\nCompare utility tariffs across suppliers.` },
            { num: '21', short: '21 Tariff', content: `# USE CASE 21: Tariff Cockpit\n\n## Quick Summary\nReact-based cockpit for managing utility tariffs.` },
            { num: '22', short: '22 Teams', content: `# USE CASE 22: Agentic Chatbot (Teams)\n\n## Quick Summary\nConversational bot for Microsoft Teams.` },
            { num: '23', short: '23 Contracts', content: `# USE CASE 23: Procurement Contracts\n\n## Quick Summary\nContract-aware procurement system.` }
        ];

        marked.setOptions({ breaks: true, gfm: true });

        function initializeTabs() {
            const tabList = document.getElementById('usecase-tabs');
            const content = document.getElementById('usecase-content');

            useCases.forEach((uc, index) => {
                // Create tab
                const tab = document.createElement('li');
                tab.className = 'nav-item';
                const isActive = index === 0 ? 'active' : '';
                tab.innerHTML = `<button class="nav-link ${isActive}" id="tab-${uc.num}" data-bs-toggle="tab" data-bs-target="#content-${uc.num}">${uc.short}</button>`;
                tabList.appendChild(tab);

                // Create pane
                const pane = document.createElement('div');
                pane.className = `tab-pane fade markdown-content ${isActive ? 'show active' : ''}`;
                pane.id = `content-${uc.num}`;
                pane.innerHTML = marked.parse(uc.content);
                content.appendChild(pane);

                // Highlight code
                pane.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            });
        }

        // Search
        document.getElementById('usecase-search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.nav-link').forEach(tab => {
                tab.style.display = tab.textContent.toLowerCase().includes(query) ? '' : 'none';
            });
        });

        // Back to top
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        });

        document.getElementById('backToTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        document.addEventListener('DOMContentLoaded', initializeTabs);
    </script>
</body>

</html>
